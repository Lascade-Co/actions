name: "Debug Build Trigger"

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: central-debug-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to central repo
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.CENTRAL_DISPATCH_TOKEN }}
          repository: Lascade-Co/actions
          event-type: build-debug-flutter
          client-payload: >-
            {
              "repo": ${{ toJSON(github.repository) }},
              "pr": ${{ toJSON(github.event.pull_request.number) }},
              "title": ${{ toJSON(github.event.pull_request.title) }},
              "project_slug": "the infisical project slug"
            }
