name: Central TARS Production Delivery
run-name: "${{ github.event.client_payload.repo }}"

on:
  repository_dispatch:
    types: [tars-deploy]

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: tars-production-delivery
  cancel-in-progress: false

jobs:
  build:
    name: Build immutable TARS release
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read
    outputs:
      release_sha: ${{ steps.payload.outputs.sha }}
      api_digest: ${{ steps.images.outputs.api_digest }}
      dispatcher_digest: ${{ steps.images.outputs.dispatcher_digest }}
      gpu_digest: ${{ steps.images.outputs.gpu_digest }}
      garage_digest: ${{ steps.images.outputs.garage_digest }}
      otel_digest: ${{ steps.images.outputs.otel_digest }}
      artifact_name: ${{ steps.bundle.outputs.artifact_name }}
    steps:
      - name: Check out central delivery code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.sha }}
          path: central
          persist-credentials: false

      - name: Validate the exact deployment payload
        id: payload
        run: >-
          python3 central/scripts/tars/tars_payload.py "$GITHUB_EVENT_PATH"
          --type deploy --github-output "$GITHUB_OUTPUT"

      - name: Mint a read-only TARS GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: Lascade-Co
          repositories: TARS
          permission-contents: read

      - name: Check out the exact dispatched TARS revision
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ steps.payload.outputs.repo }}
          ref: ${{ steps.payload.outputs.sha }}
          token: ${{ steps.app-token.outputs.token }}
          path: source
          fetch-depth: 1
          persist-credentials: false

      - name: Refuse a stale main build
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REPO: ${{ steps.payload.outputs.repo }}
          RELEASE_SHA: ${{ steps.payload.outputs.sha }}
        run: |
          main_sha="$(gh api "repos/$TARGET_REPO/git/ref/heads/main" --jq .object.sha)"
          if [ "$RELEASE_SHA" != "$main_sha" ]; then
            echo "refusing stale TARS build: dispatched revision is no longer main" >&2
            exit 1
          fi

      - name: Validate and expose the production release lock
        id: lock
        run: |
          python3 source/release/validate_lock.py source/release/lock.json
          python3 central/scripts/tars/tars_lock_outputs.py source/release/lock.json \
            --workflow central/.github/workflows/tars-ci.yml \
            --workflow central/.github/workflows/tars-deploy.yml \
            --workflow central/.github/workflows/tars-unlock.yml \
            --github-output "$GITHUB_OUTPUT"

      - name: Fetch the locked TADA bundle outside the source build context
        env:
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
          ORAS_IMAGE: ${{ steps.lock.outputs.oras_image }}
          TADA_OCI: ${{ steps.lock.outputs.tada_oci }}
        run: |
          umask 077
          token_file="$RUNNER_TEMP/tars-build-ghcr.token"
          trap 'rm -f "$token_file"' EXIT
          printf '%s' "$GHCR_TOKEN" > "$token_file"
          python3 central/scripts/tars/tars_tada_bundle.py \
            --oras-image "$ORAS_IMAGE" \
            --tada-oci "$TADA_OCI" \
            --username "$GHCR_USER" \
            --token-file "$token_file" \
            --output-directory "$RUNNER_TEMP/tada-bundle"

      - name: Fetch deployment secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          project-slug: tars
          env-slug: prod
          secret-path: /deployment
          include-imports: "false"
          recursive: "false"
          export-type: env

      - name: Capture build credentials in owner-only files and clear runner exports
        run: |
          umask 077
          python3 central/scripts/tars/tars_runner_secrets.py capture-build \
            --output-directory "$RUNNER_TEMP/tars-docker-config" \
            --github-env "$GITHUB_ENV"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/tars-docker-config" >> "$GITHUB_ENV"

      - name: Configure Buildx
        uses: docker/setup-buildx-action@v4.2.0
        with:
          version: v${{ steps.lock.outputs.docker_buildx_version }}

      - name: Capture build metadata
        id: metadata
        env:
          RELEASE_SHA: ${{ steps.payload.outputs.sha }}
        run: |
          built_at="$(git -C source show -s --format=%cI "$RELEASE_SHA")"
          source_date_epoch="$(git -C source show -s --format=%ct "$RELEASE_SHA")"
          case "$source_date_epoch" in
            ""|*[!0-9]*)
              echo "invalid source commit timestamp" >&2
              exit 1
              ;;
          esac
          printf 'built_at=%s\n' "$built_at" >> "$GITHUB_OUTPUT"
          printf 'source_date_epoch=%s\n' "$source_date_epoch" >> "$GITHUB_OUTPUT"

      - name: Resolve existing exact-SHA image tags
        id: existing-images
        env:
          REGISTRY: ${{ steps.lock.outputs.registry }}
          RELEASE_SHA: ${{ steps.payload.outputs.sha }}
        run: |
          python3 central/scripts/tars/tars_registry_release.py probe \
            --registry "$REGISTRY" \
            --release-sha "$RELEASE_SHA" \
            --docker-config "$RUNNER_TEMP/tars-docker-config" \
            --github-output "$GITHUB_OUTPUT"

      - name: Build and push API
        id: api
        if: steps.existing-images.outputs.api_exists != 'true'
        env:
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
        uses: docker/build-push-action@v7.3.0
        with:
          context: source
          file: source/Dockerfile.api
          platforms: ${{ steps.lock.outputs.target_platform }}
          push: true
          provenance: false
          tags: ${{ steps.lock.outputs.registry }}:api-sha-${{ steps.payload.outputs.sha }}
          build-args: |
            GO_IMAGE=${{ steps.lock.outputs.go_image }}
            RUNTIME_IMAGE=${{ steps.lock.outputs.api_runtime_image }}
            TARS_VERSION=sha-${{ steps.payload.outputs.sha }}
            TARS_REVISION=${{ steps.payload.outputs.sha }}
            TARS_BUILT_AT=${{ steps.metadata.outputs.built_at }}
          cache-from: type=gha,scope=tars-api
          cache-to: type=gha,mode=max,scope=tars-api

      - name: Build and push dispatcher with the locked private TADA bundle
        id: dispatcher
        if: steps.existing-images.outputs.dispatcher_exists != 'true'
        env:
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
        uses: docker/build-push-action@v7.3.0
        with:
          context: source
          file: source/Dockerfile.dispatcher
          platforms: ${{ steps.lock.outputs.target_platform }}
          push: true
          provenance: false
          tags: ${{ steps.lock.outputs.registry }}:dispatcher-sha-${{ steps.payload.outputs.sha }}
          build-contexts: |
            tada_bundle=${{ runner.temp }}/tada-bundle
          build-args: |
            GO_IMAGE=${{ steps.lock.outputs.go_image }}
            UV_IMAGE=${{ steps.lock.outputs.uv_image }}
            PYTHON_IMAGE=${{ steps.lock.outputs.python_image }}
            TADA_REPOSITORY=${{ steps.lock.outputs.tada_repository }}
            TADA_OCI=${{ steps.lock.outputs.tada_oci }}
            TADA_REVISION=${{ steps.lock.outputs.tada_revision }}
            TARS_VERSION=sha-${{ steps.payload.outputs.sha }}
            TARS_REVISION=${{ steps.payload.outputs.sha }}
            TARS_BUILT_AT=${{ steps.metadata.outputs.built_at }}
          cache-from: type=gha,scope=tars-dispatcher
          cache-to: type=gha,mode=max,scope=tars-dispatcher

      - name: Build and push Runpod GPU worker with the same TADA bundle
        id: gpu
        if: steps.existing-images.outputs.gpu_exists != 'true'
        env:
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
        uses: docker/build-push-action@v7.3.0
        with:
          context: source
          file: source/Dockerfile.gpu
          platforms: ${{ steps.lock.outputs.target_platform }}
          push: true
          provenance: false
          tags: ${{ steps.lock.outputs.registry }}:gpu-sha-${{ steps.payload.outputs.sha }}
          build-contexts: |
            tada_bundle=${{ runner.temp }}/tada-bundle
          build-args: |
            UV_IMAGE=${{ steps.lock.outputs.uv_image }}
            PYTHON_IMAGE=${{ steps.lock.outputs.python_image }}
            TADA_REPOSITORY=${{ steps.lock.outputs.tada_repository }}
            TADA_OCI=${{ steps.lock.outputs.tada_oci }}
            TADA_REVISION=${{ steps.lock.outputs.tada_revision }}
            TARS_VERSION=sha-${{ steps.payload.outputs.sha }}
            TARS_REVISION=${{ steps.payload.outputs.sha }}
          cache-from: type=gha,scope=tars-gpu
          cache-to: type=gha,mode=max,scope=tars-gpu

      - name: Build and push Garage wrapper
        id: garage
        if: steps.existing-images.outputs.garage_exists != 'true'
        env:
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
        uses: docker/build-push-action@v7.3.0
        with:
          context: source
          file: source/deploy/garage/Dockerfile
          platforms: ${{ steps.lock.outputs.target_platform }}
          push: true
          provenance: false
          tags: ${{ steps.lock.outputs.registry }}:garage-sha-${{ steps.payload.outputs.sha }}
          build-args: |
            GARAGE_UPSTREAM_IMAGE=${{ steps.lock.outputs.garage_upstream_image }}
            ALPINE_IMAGE=${{ steps.lock.outputs.support_alpine_image }}
          cache-from: type=gha,scope=tars-garage
          cache-to: type=gha,mode=max,scope=tars-garage

      - name: Build and push OpenTelemetry wrapper
        id: otel
        if: steps.existing-images.outputs.otel_exists != 'true'
        env:
          SOURCE_DATE_EPOCH: ${{ steps.metadata.outputs.source_date_epoch }}
        uses: docker/build-push-action@v7.3.0
        with:
          context: source
          file: source/deploy/otel/Dockerfile
          platforms: ${{ steps.lock.outputs.target_platform }}
          push: true
          provenance: false
          tags: ${{ steps.lock.outputs.registry }}:otel-sha-${{ steps.payload.outputs.sha }}
          build-args: |
            OTEL_UPSTREAM_IMAGE=${{ steps.lock.outputs.otel_upstream_image }}
            ALPINE_IMAGE=${{ steps.lock.outputs.support_alpine_image }}
          cache-from: type=gha,scope=tars-otel
          cache-to: type=gha,mode=max,scope=tars-otel

      - name: Verify the immutable image tag set
        id: images
        env:
          API_BUILD_DIGEST: ${{ steps.api.outputs.digest }}
          DISPATCHER_BUILD_DIGEST: ${{ steps.dispatcher.outputs.digest }}
          GPU_BUILD_DIGEST: ${{ steps.gpu.outputs.digest }}
          GARAGE_BUILD_DIGEST: ${{ steps.garage.outputs.digest }}
          OTEL_BUILD_DIGEST: ${{ steps.otel.outputs.digest }}
          REGISTRY: ${{ steps.lock.outputs.registry }}
          RELEASE_SHA: ${{ steps.payload.outputs.sha }}
        run: |
          python3 central/scripts/tars/tars_registry_release.py verify \
            --registry "$REGISTRY" \
            --release-sha "$RELEASE_SHA" \
            --docker-config "$RUNNER_TEMP/tars-docker-config" \
            --expected-api-digest "$API_BUILD_DIGEST" \
            --expected-dispatcher-digest "$DISPATCHER_BUILD_DIGEST" \
            --expected-gpu-digest "$GPU_BUILD_DIGEST" \
            --expected-garage-digest "$GARAGE_BUILD_DIGEST" \
            --expected-otel-digest "$OTEL_BUILD_DIGEST" \
            --github-output "$GITHUB_OUTPUT"

      - name: Create the exact-SHA source bundle and verified digest metadata
        id: bundle
        env:
          RELEASE_SHA: ${{ steps.payload.outputs.sha }}
          API_DIGEST: ${{ steps.images.outputs.api_digest }}
          DISPATCHER_DIGEST: ${{ steps.images.outputs.dispatcher_digest }}
          GPU_DIGEST: ${{ steps.images.outputs.gpu_digest }}
          GARAGE_DIGEST: ${{ steps.images.outputs.garage_digest }}
          OTEL_DIGEST: ${{ steps.images.outputs.otel_digest }}
        run: |
          artifact="$RUNNER_TEMP/tars-release-artifact"
          install -d -m 0700 "$artifact"
          printf '%s\n' "$RELEASE_SHA" > source/.tars-release-sha
          tar -C source --exclude=.git -czf "$artifact/tars-source.tar.gz" .
          python3 - "$artifact/release-metadata.json" <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          sha = re.compile(r"[0-9a-f]{40}\Z")
          digest = re.compile(r"sha256:[0-9a-f]{64}\Z")
          metadata = {
              "release_sha": os.environ["RELEASE_SHA"],
              "api_digest": os.environ["API_DIGEST"],
              "dispatcher_digest": os.environ["DISPATCHER_DIGEST"],
              "gpu_digest": os.environ["GPU_DIGEST"],
              "garage_digest": os.environ["GARAGE_DIGEST"],
              "otel_digest": os.environ["OTEL_DIGEST"],
          }
          if sha.fullmatch(metadata["release_sha"]) is None:
              raise SystemExit("release metadata contains an invalid SHA")
          if any(
              digest.fullmatch(value) is None
              for key, value in metadata.items()
              if key.endswith("_digest")
          ):
              raise SystemExit("release metadata contains an invalid image digest")
          path = Path(sys.argv[1])
          path.write_text(
              json.dumps(metadata, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          path.chmod(0o600)
          PY
          (
          cd "$artifact" || exit 1
            sha256sum tars-source.tar.gz release-metadata.json > SHA256SUMS
          )
          chmod 0600 "$artifact/SHA256SUMS"
          artifact_name="tars-release-$RELEASE_SHA"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload the immutable deployment interface
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.bundle.outputs.artifact_name }}
          path: ${{ runner.temp }}/tars-release-artifact/
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 1
          compression-level: 0

      - name: Remove build credentials
        if: always()
        run: |
          docker logout registry.digitalocean.com >/dev/null 2>&1 || true
          config="${DOCKER_CONFIG:-$RUNNER_TEMP/tars-docker-config}"
          rm -f "$config/config.json"

  deploy:
    name: Deploy TARS production
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 360
    steps:
      - name: Check out central delivery code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.sha }}
          path: central
          persist-credentials: false

      - name: Revalidate the exact deployment payload
        id: payload
        run: >-
          python3 central/scripts/tars/tars_payload.py "$GITHUB_EVENT_PATH"
          --type deploy --github-output "$GITHUB_OUTPUT"

      - name: Match build output to the dispatched SHA
        env:
          PAYLOAD_SHA: ${{ steps.payload.outputs.sha }}
          BUILT_SHA: ${{ needs.build.outputs.release_sha }}
        run: test "$PAYLOAD_SHA" = "$BUILT_SHA"

      - name: Mint a fresh read-only TARS GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: Lascade-Co
          repositories: TARS
          permission-contents: read

      - name: Refuse stale work after waiting for the deployment lock
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REPO: ${{ steps.payload.outputs.repo }}
          RELEASE_SHA: ${{ steps.payload.outputs.sha }}
        run: |
          main_sha="$(gh api "repos/$TARGET_REPO/git/ref/heads/main" --jq .object.sha)"
          if [ "$RELEASE_SHA" != "$main_sha" ]; then
            echo "refusing stale TARS deployment after serialization wait" >&2
            exit 1
          fi

      - name: Download the exact build output
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ${{ runner.temp }}/tars-release-artifact

      - name: Verify the local artifact interface and expose digest metadata
        id: artifact
        env:
          RELEASE_SHA: ${{ steps.payload.outputs.sha }}
          BUILT_API_DIGEST: ${{ needs.build.outputs.api_digest }}
          BUILT_DISPATCHER_DIGEST: ${{ needs.build.outputs.dispatcher_digest }}
          BUILT_GPU_DIGEST: ${{ needs.build.outputs.gpu_digest }}
          BUILT_GARAGE_DIGEST: ${{ needs.build.outputs.garage_digest }}
          BUILT_OTEL_DIGEST: ${{ needs.build.outputs.otel_digest }}
        run: |
          artifact="$RUNNER_TEMP/tars-release-artifact"
          verify="$RUNNER_TEMP/tars-release-verify"
          install -d -m 0700 "$verify"
          python3 - "$artifact" "$GITHUB_OUTPUT" <<'PY'
          import hashlib
          import json
          import os
          import re
          import stat
          import sys
          from pathlib import Path

          root = Path(sys.argv[1])
          output = Path(sys.argv[2])
          expected_files = ("tars-source.tar.gz", "release-metadata.json")
          manifest_path = root / "SHA256SUMS"
          for path in (manifest_path, *(root / name for name in expected_files)):
              metadata = path.lstat()
              if not stat.S_ISREG(metadata.st_mode):
                  raise SystemExit(f"artifact member is not a regular file: {path.name}")
          lines = manifest_path.read_text(encoding="utf-8").splitlines()
          if len(lines) != len(expected_files):
              raise SystemExit("artifact checksum manifest has an invalid member count")
          checksums = {}
          for line in lines:
              match = re.fullmatch(r"([0-9a-f]{64})  ([A-Za-z0-9.-]+)", line)
              if match is None or match.group(2) not in expected_files:
                  raise SystemExit("artifact checksum manifest is invalid")
              if match.group(2) in checksums:
                  raise SystemExit("artifact checksum manifest contains a duplicate")
              checksums[match.group(2)] = match.group(1)
          if set(checksums) != set(expected_files):
              raise SystemExit("artifact checksum manifest is incomplete")
          for name, expected in checksums.items():
              actual = hashlib.sha256((root / name).read_bytes()).hexdigest()
              if actual != expected:
                  raise SystemExit(f"artifact checksum mismatch: {name}")

          metadata = json.loads((root / "release-metadata.json").read_text("utf-8"))
          keys = {
              "release_sha",
              "api_digest",
              "dispatcher_digest",
              "gpu_digest",
              "garage_digest",
              "otel_digest",
          }
          if not isinstance(metadata, dict) or set(metadata) != keys:
              raise SystemExit("release metadata has an invalid schema")
          if re.fullmatch(r"[0-9a-f]{40}", metadata["release_sha"]) is None:
              raise SystemExit("release metadata SHA is invalid")
          for key in keys - {"release_sha"}:
              if re.fullmatch(r"sha256:[0-9a-f]{64}", metadata[key]) is None:
                  raise SystemExit(f"release metadata digest is invalid: {key}")
          expected = {
              "release_sha": os.environ["RELEASE_SHA"],
              "api_digest": os.environ["BUILT_API_DIGEST"],
              "dispatcher_digest": os.environ["BUILT_DISPATCHER_DIGEST"],
              "gpu_digest": os.environ["BUILT_GPU_DIGEST"],
              "garage_digest": os.environ["BUILT_GARAGE_DIGEST"],
              "otel_digest": os.environ["BUILT_OTEL_DIGEST"],
          }
          if metadata != expected:
              raise SystemExit("artifact metadata does not match the build outputs")
          with output.open("a", encoding="utf-8") as handle:
              for key in sorted(keys - {"release_sha"}):
                  handle.write(f"{key}={metadata[key]}\n")
          PY
          tar -xzf "$artifact/tars-source.tar.gz" -C "$verify"
          test "$(cat "$verify/.tars-release-sha")" = "$RELEASE_SHA"
          test -x "$verify/deploy/tars-deploy"
          python3 central/scripts/tars/tars_lock_outputs.py "$verify/release/lock.json" \
            --workflow central/.github/workflows/tars-ci.yml \
            --workflow central/.github/workflows/tars-deploy.yml \
            --workflow central/.github/workflows/tars-unlock.yml \
            --github-output "$GITHUB_OUTPUT"

      - name: Fetch deployment secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          project-slug: tars
          env-slug: prod
          secret-path: /deployment
          include-imports: "false"
          recursive: "false"
          export-type: env

      - name: Fetch runtime secrets from Infisical
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          project-slug: tars
          env-slug: prod
          secret-path: /runtime
          include-imports: "false"
          recursive: "false"
          export-type: env

      - name: Validate and capture delegated deployment secrets
        id: connection
        run: |
          umask 077
          python3 central/scripts/tars/tars_runner_secrets.py capture-deploy \
            --output-directory "$RUNNER_TEMP/tars-deploy-secrets" \
            --github-output "$GITHUB_OUTPUT" \
            --github-env "$GITHUB_ENV"
          printf '%s' "$DOCR_READ_USERNAME" \
            > "$RUNNER_TEMP/tars-deploy-secrets/DOCR_READ_USERNAME"
          printf '%s' "$DOCR_READ_PASSWORD" \
            > "$RUNNER_TEMP/tars-deploy-secrets/DOCR_READ_PASSWORD"
          chmod 0600 \
            "$RUNNER_TEMP/tars-deploy-secrets/DOCR_READ_USERNAME" \
            "$RUNNER_TEMP/tars-deploy-secrets/DOCR_READ_PASSWORD"

      - name: Connect the runner to the TARS private route
        uses: rohittp0/wiregaurd@v3
        with:
          config: ${{ steps.connection.outputs.wireguard_config }}
          ips: ${{ steps.connection.outputs.host }}

      - name: Install the pinned SSH identity and known-host set
        run: |
          install -d -m 0700 "$HOME/.ssh"
          install -m 0600 "$RUNNER_TEMP/tars-deploy-secrets/DEPLOY_SSH_PRIVATE_KEY" "$HOME/.ssh/tars_key"
          install -m 0600 "$RUNNER_TEMP/tars-deploy-secrets/DEPLOY_SSH_KNOWN_HOSTS" "$HOME/.ssh/tars_known_hosts"

      - name: Upload the verified source bundle
        env:
          SSH_HOST: ${{ steps.connection.outputs.host }}
          SSH_USER: ${{ steps.connection.outputs.user }}
          RELEASE_SHA: ${{ steps.payload.outputs.sha }}
        run: |
          ssh_options=(
            -i "$HOME/.ssh/tars_key"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o TCPKeepAlive=yes
            -o "UserKnownHostsFile=$HOME/.ssh/tars_known_hosts"
          )
          target="$SSH_USER@$SSH_HOST"
          upload_dir=".tars-upload-$RELEASE_SHA"
          # The validated SHA-derived path is intentionally expanded locally.
          # shellcheck disable=SC2029
          ssh "${ssh_options[@]}" "$target" "install -d -m 0700 '$upload_dir'"
          scp "${ssh_options[@]}" \
            "$RUNNER_TEMP/tars-release-artifact/tars-source.tar.gz" \
            "$target:$upload_dir/"
          ssh "${ssh_options[@]}" "$target" /bin/sh -s -- "$RELEASE_SHA" <<'REMOTE'
          set -eu
          sha=$1
          case "$sha" in *[!0-9a-f]*|'') exit 64 ;; esac
          test "${#sha}" -eq 40
          upload="$HOME/.tars-upload-$sha"
          bundle="/srv/tars/incoming/$sha"
          rm -rf -- "$bundle"
          install -d -m 0750 "$bundle"
          tar -xzf "$upload/tars-source.tar.gz" -C "$bundle"
          test "$(cat "$bundle/.tars-release-sha")" = "$sha"
          rm -rf -- "$upload"
          REMOTE

      - name: Refuse an orphaned deployment lock
        env:
          SSH_HOST: ${{ steps.connection.outputs.host }}
          SSH_USER: ${{ steps.connection.outputs.user }}
          RECOVERY_SHA: ${{ steps.payload.outputs.sha }}
        run: |
          ssh_options=(
            -i "$HOME/.ssh/tars_key"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o TCPKeepAlive=yes
            -o "UserKnownHostsFile=$HOME/.ssh/tars_known_hosts"
          )
          target="$SSH_USER@$SSH_HOST"
          ssh "${ssh_options[@]}" "$target" /bin/sh -s -- "$RECOVERY_SHA" <<'REMOTE'
          set -eu
          recovery_sha=$1
          case "$recovery_sha" in ""|*[!0-9a-f]*) exit 64 ;; esac
          test "${#recovery_sha}" -eq 40
          found=false
          config_names="$(docker config ls \
            --filter name=tars_deploy_lock --format '{{.Name}}')"
          # Docker config names cannot contain whitespace.
          # shellcheck disable=SC2086
          for name in $config_names; do
            if [ "$name" = tars_deploy_lock ]; then
              found=true
            fi
          done
          if [ "$found" = false ]; then
            exit 0
          fi
          owner="$(docker config inspect tars_deploy_lock \
            --format '{{index .Spec.Labels "tars.owner"}}')"
          case "$owner" in
            ""|*[!0-9a-f]*)
              echo "tars_deploy_lock has an invalid owner; inspect it before deployment" >&2
              exit 1
              ;;
          esac
          if [ "${#owner}" -ne 40 ]; then
            echo "tars_deploy_lock has an invalid owner; inspect it before deployment" >&2
            exit 1
          fi
          boundary=/srv/tars/deployment/runpod-rollout-boundary.json
          if [ -f "$boundary" ] && [ ! -L "$boundary" ] && \
             [ "$(stat -c '%a' "$boundary")" = 600 ] && \
             [ "$(stat -c '%u' "$boundary")" = "$(id -u)" ]; then
            echo "deployment lock recovery is coupled to the durable Runpod boundary"
            exit 0
          fi
          echo "TARS deployment lock is held by $owner." >&2
          echo "Run 'Manual TARS deployment-lock recovery' with expected_owner=$owner and recovery_sha=$recovery_sha, then rerun deployment." >&2
          exit 1
          REMOTE

      - name: Confirm the final current main revision
        id: current-main
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_REPO: ${{ steps.payload.outputs.repo }}
          RELEASE_SHA: ${{ steps.payload.outputs.sha }}
        run: |
          main_sha="$(gh api "repos/$TARGET_REPO/git/ref/heads/main" --jq .object.sha)"
          if [ "$RELEASE_SHA" != "$main_sha" ]; then
            echo "refusing stale TARS deployment at the final gate" >&2
            exit 1
          fi
          echo "sha=$main_sha" >> "$GITHUB_OUTPUT"

      - name: Reconcile any durable boundary before changing application state
        id: initial-app
        env:
          SSH_HOST: ${{ steps.connection.outputs.host }}
          SSH_USER: ${{ steps.connection.outputs.user }}
        run: |
          ssh_options=(
            -i "$HOME/.ssh/tars_key"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o TCPKeepAlive=yes
            -o "UserKnownHostsFile=$HOME/.ssh/tars_known_hosts"
          )
          target="$SSH_USER@$SSH_HOST"
          state="$RUNNER_TEMP/tars-initial-app-state"
          local_boundary="$RUNNER_TEMP/tars-prior-runpod-boundary.json"
          if ssh "${ssh_options[@]}" "$target" /bin/sh -s \
            > "$local_boundary" <<'REMOTE'
          set -eu
          boundary=/srv/tars/deployment/runpod-rollout-boundary.json
          if [ ! -e "$boundary" ] && [ ! -L "$boundary" ]; then
            exit 42
          fi
          test -f "$boundary"
          test ! -L "$boundary"
          test "$(stat -c '%a' "$boundary")" = 600
          test "$(stat -c '%u' "$boundary")" = "$(id -u)"
          cat "$boundary"
          REMOTE
          then
            chmod 0600 "$local_boundary"
          else
            status=$?
            rm -f "$local_boundary"
            if [ "$status" -eq 42 ]; then
              echo "interrupted=false" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "the durable Runpod boundary is invalid or unreadable" >&2
              exit "$status"
            fi
          fi
          values="$RUNNER_TEMP/tars-initial-boundary-values"
          : > "$values"
          chmod 0600 "$values"
          python3 central/scripts/tars/tars_runpod_release.py describe-boundary \
            --boundary-file "$local_boundary" \
            --github-output "$values"
          get_value() {
            name=$1
            value="$(sed -n "s/^$name=//p" "$values")"
            test "$(grep -c "^$name=" "$values")" -eq 1
            printf '%s' "$value"
          }
          kind="$(get_value kind)"
          if [ "$kind" = application ]; then
            release_sha="$(get_value app_release_sha)"
            gpu_image="$(get_value app_gpu_image)"
            endpoint_id="$(get_value endpoint_id)"
            replicas="$(get_value replicas)"
            python3 central/scripts/tars/tars_runpod_release.py \
              verify-application \
              --api-key-file "$RUNNER_TEMP/tars-deploy-secrets/RUNPOD_API_KEY" \
              --boundary-file "$local_boundary" \
              --endpoint-id-file "$RUNNER_TEMP/tars-deploy-secrets/RUNPOD_ENDPOINT_ID" \
              --template-id-file "$RUNNER_TEMP/tars-deploy-secrets/RUNPOD_TEMPLATE_ID" \
              --auth-id-file "$RUNNER_TEMP/tars-deploy-secrets/RUNPOD_REGISTRY_AUTH_ID"
            boundary_sha="$(
              shasum -a 256 "$local_boundary" | awk '{print $1}'
            )"
            ssh "${ssh_options[@]}" "$target" /bin/sh -s -- \
              "$release_sha" "$gpu_image" "$endpoint_id" "$replicas" \
              "$boundary_sha" <<'REMOTE'
            set -eu
            release_sha=$1
            gpu_image=$2
            endpoint_id=$3
            replicas=$4
            boundary_sha=$5
            boundary=/srv/tars/deployment/runpod-rollout-boundary.json
            test "$replicas" = 1
            test -f "$boundary"
            test ! -L "$boundary"
            test "$(stat -c '%a' "$boundary")" = 600
            test "$(stat -c '%u' "$boundary")" = "$(id -u)"
            test "$(sha256sum "$boundary" | awk '{print $1}')" = "$boundary_sha"
            ! docker config inspect tars_deploy_lock >/dev/null 2>&1
            for service in tars_nginx tars_api tars_dispatcher tars_otel-collector; do
              docker service inspect "$service" >/dev/null 2>&1
            done
            live_sha="$(docker service inspect \
              --format '{{index .Spec.Labels "tars.release.sha"}}' \
              tars_dispatcher)"
            live_environment="$(docker service inspect \
              --format '{{range .Spec.TaskTemplate.ContainerSpec.Env}}{{println .}}{{end}}' \
              tars_dispatcher)"
            live_gpu="$(printf '%s\n' "$live_environment" |
              sed -n 's/^TARS_GPU_IMAGE_DIGEST=//p')"
            live_endpoint="$(printf '%s\n' "$live_environment" |
              sed -n 's/^TARS_RUNPOD_ENDPOINT_ID=//p')"
            test "$live_sha" = "$release_sha"
            test "$live_gpu" = "$gpu_image"
            test "$live_endpoint" = "$endpoint_id"
            recorded_sha="$(python3 -c \
              'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["sha"])' \
              /srv/tars/deployment/current.json)"
            test "$recorded_sha" = "$release_sha"
            docker service scale "tars_dispatcher=$replicas" >/dev/null
            deadline=$(( $(date +%s) + 900 ))
            while :; do
              actual="$(docker service ls --filter name=tars_dispatcher \
                --format '{{.Replicas}}')"
              if [ "$actual" = "$replicas/$replicas" ]; then
                break
              fi
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "pre-drain dispatcher did not return during recovery" >&2
                exit 1
              fi
              sleep 5
            done
            live_sha="$(docker service inspect \
              --format '{{index .Spec.Labels "tars.release.sha"}}' \
              tars_dispatcher)"
            live_environment="$(docker service inspect \
              --format '{{range .Spec.TaskTemplate.ContainerSpec.Env}}{{println .}}{{end}}' \
              tars_dispatcher)"
            live_gpu="$(printf '%s\n' "$live_environment" |
              sed -n 's/^TARS_GPU_IMAGE_DIGEST=//p')"
            live_endpoint="$(printf '%s\n' "$live_environment" |
              sed -n 's/^TARS_RUNPOD_ENDPOINT_ID=//p')"
            test "$live_sha" = "$release_sha"
            test "$live_gpu" = "$gpu_image"
            test "$live_endpoint" = "$endpoint_id"
            rm -f "$boundary"
          REMOTE
            rm -f "$local_boundary"
            echo "interrupted=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test "$kind" = rollout
          ssh "${ssh_options[@]}" "$target" /bin/sh -s <<'REMOTE' > "$state"
          set -eu
          service=tars_dispatcher
          if ! docker service inspect "$service" >/dev/null 2>&1; then
            printf '%s\n\n\n\n' greenfield
            exit 0
          fi
          replicas="$(docker service inspect \
            --format '{{.Spec.Mode.Replicated.Replicas}}' "$service")"
          release_sha="$(docker service inspect \
            --format '{{index .Spec.Labels "tars.release.sha"}}' "$service")"
          environment="$(docker service inspect \
            --format '{{range .Spec.TaskTemplate.ContainerSpec.Env}}{{println .}}{{end}}' \
            "$service")"
          gpu_image="$(printf '%s\n' "$environment" |
            sed -n 's/^TARS_GPU_IMAGE_DIGEST=//p')"
          endpoint_id="$(printf '%s\n' "$environment" |
            sed -n 's/^TARS_RUNPOD_ENDPOINT_ID=//p')"
          case "$replicas" in 0|1) ;; *) exit 64 ;; esac
          case "$release_sha" in ""|*[!0-9a-f]*) exit 64 ;; esac
          test "${#release_sha}" -eq 40
          test -n "$gpu_image"
          case "$endpoint_id" in ""|*[!A-Za-z0-9_-]*) exit 64 ;; esac
          docker service scale "$service=0" >/dev/null
          deadline=$(( $(date +%s) + 8400 ))
          while [ -n "$(docker service ps \
            --filter desired-state=running --format '{{.ID}}' "$service")" ]; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "dispatcher did not drain before interrupted recovery" >&2
              exit 1
            fi
            sleep 5
          done
          printf '%s\n%s\n%s\n%s\n' \
            existing "$release_sha" "$gpu_image" "$endpoint_id"
          REMOTE
          chmod 0600 "$state"
          echo "interrupted=true" >> "$GITHUB_OUTPUT"
          echo "mode=$(sed -n '1p' "$state")" >> "$GITHUB_OUTPUT"
          echo "release_sha=$(sed -n '2p' "$state")" >> "$GITHUB_OUTPUT"
          echo "gpu_image=$(sed -n '3p' "$state")" >> "$GITHUB_OUTPUT"
          echo "endpoint_id=$(sed -n '4p' "$state")" >> "$GITHUB_OUTPUT"

      - name: Describe the interrupted rollback boundary
        if: steps.initial-app.outputs.interrupted == 'true'
        id: interrupted
        run: |
          python3 central/scripts/tars/tars_runpod_release.py describe \
            --receipt-file "$RUNNER_TEMP/tars-prior-runpod-boundary.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Classify the interrupted application transaction
        if: steps.initial-app.outputs.interrupted == 'true'
        id: interrupted-app
        env:
          BASELINE: ${{ steps.interrupted.outputs.baseline }}
          PRIOR_SHA: ${{ steps.interrupted.outputs.prior_release_sha }}
          PRIOR_GPU_IMAGE: ${{ steps.interrupted.outputs.prior_gpu_image }}
          TARGET_SHA: ${{ steps.interrupted.outputs.release_sha }}
          TARGET_GPU_IMAGE: ${{ steps.interrupted.outputs.target_image }}
          ENDPOINT_ID: ${{ steps.interrupted.outputs.endpoint_id }}
          SSH_HOST: ${{ steps.connection.outputs.host }}
          SSH_USER: ${{ steps.connection.outputs.user }}
        run: |
          ssh_options=(
            -i "$HOME/.ssh/tars_key"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o TCPKeepAlive=yes
            -o "UserKnownHostsFile=$HOME/.ssh/tars_known_hosts"
          )
          target="$SSH_USER@$SSH_HOST"
          classification="$(
            ssh "${ssh_options[@]}" "$target" /bin/sh -s -- \
              "$BASELINE" "$PRIOR_SHA" "$PRIOR_GPU_IMAGE" \
              "$TARGET_SHA" "$TARGET_GPU_IMAGE" "$ENDPOINT_ID" <<'REMOTE'
          set -eu
          baseline=$1
          prior_sha=$2
          prior_gpu=$3
          target_sha=$4
          target_gpu=$5
          expected_endpoint=$6
          present=0
          for service in tars_nginx tars_api tars_dispatcher tars_otel-collector; do
            if docker service inspect "$service" >/dev/null 2>&1; then
              present=$((present + 1))
            fi
          done
          if [ "$present" -ne 0 ] && [ "$present" -ne 4 ]; then
            echo "partial application state requires operator recovery" >&2
            exit 1
          fi
          live_sha=
          live_gpu=
          live_endpoint=
          if [ "$present" -eq 4 ]; then
            live_sha="$(docker service inspect \
              --format '{{index .Spec.Labels "tars.release.sha"}}' \
              tars_dispatcher)"
            live_gpu="$(docker service inspect \
              --format '{{range .Spec.TaskTemplate.ContainerSpec.Env}}{{println .}}{{end}}' \
              tars_dispatcher | sed -n 's/^TARS_GPU_IMAGE_DIGEST=//p')"
            live_endpoint="$(docker service inspect \
              --format '{{range .Spec.TaskTemplate.ContainerSpec.Env}}{{println .}}{{end}}' \
              tars_dispatcher | sed -n 's/^TARS_RUNPOD_ENDPOINT_ID=//p')"
          fi
          locked=false
          if docker config inspect tars_deploy_lock >/dev/null 2>&1; then
            locked=true
            owner="$(docker config inspect tars_deploy_lock \
              --format '{{index .Spec.Labels "tars.owner"}}')"
            if [ "$owner" != "$target_sha" ]; then
              echo "interrupted application lock does not belong to its durable boundary" >&2
              exit 1
            fi
          fi
          if [ "$baseline" = existing ] && \
             [ "$present" -eq 4 ] && \
             [ "$live_sha" = "$prior_sha" ] && \
             [ "$live_gpu" = "$prior_gpu" ] && \
             [ "$live_endpoint" = "$expected_endpoint" ] && \
             [ "$locked" = false ]; then
            echo existing-baseline
          elif [ "$baseline" = existing ] && \
               { [ "$present" -eq 0 ] || \
                 { [ "$live_sha" = "$target_sha" ] && \
                   [ "$live_gpu" = "$target_gpu" ] && \
                   [ "$live_endpoint" = "$expected_endpoint" ]; } || \
                 { [ "$live_sha" = "$prior_sha" ] && \
                   [ "$live_gpu" = "$prior_gpu" ] && \
                   [ "$live_endpoint" = "$expected_endpoint" ] && \
                   [ "$locked" = true ]; }; }; then
            echo repair-existing
          elif [ "$baseline" = greenfield ] && \
               [ "$present" -eq 0 ] && [ "$locked" = false ]; then
            echo greenfield-baseline
          elif [ "$baseline" = greenfield ] && \
               [ "$present" -eq 4 ] && \
               [ "$live_sha" = "$target_sha" ] && \
               [ "$live_gpu" = "$target_gpu" ] && \
               [ "$live_endpoint" = "$expected_endpoint" ]; then
            echo repair-greenfield
          else
            echo "interrupted application does not match its durable boundary" >&2
            exit 1
          fi
          REMOTE
          )"
          case "$classification" in
            existing-baseline|greenfield-baseline|repair-existing|repair-greenfield) ;;
            *) exit 64 ;;
          esac
          echo "classification=$classification" >> "$GITHUB_OUTPUT"

      - name: Reconcile the interrupted provider generation
        if: steps.initial-app.outputs.interrupted == 'true'
        env:
          BASELINE: ${{ steps.interrupted.outputs.baseline }}
        run: |
          if [ "$BASELINE" = greenfield ]; then
            command=verify-target
          else
            test "$BASELINE" = existing
            command=rollback
          fi
          python3 central/scripts/tars/tars_runpod_release.py "$command" \
            --api-key-file "$RUNNER_TEMP/tars-deploy-secrets/RUNPOD_API_KEY" \
            --receipt-file "$RUNNER_TEMP/tars-prior-runpod-boundary.json"

      - name: Repair an interrupted application transaction
        if: >-
          steps.initial-app.outputs.interrupted == 'true' &&
          (steps.interrupted-app.outputs.classification == 'repair-existing' ||
           steps.interrupted-app.outputs.classification == 'repair-greenfield')
        env:
          CLASSIFICATION: ${{ steps.interrupted-app.outputs.classification }}
          PRIOR_SHA: ${{ steps.interrupted.outputs.prior_release_sha }}
          TARGET_SHA: ${{ steps.interrupted.outputs.release_sha }}
          SSH_HOST: ${{ steps.connection.outputs.host }}
          SSH_USER: ${{ steps.connection.outputs.user }}
        run: |
          ssh_options=(
            -i "$HOME/.ssh/tars_key"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o TCPKeepAlive=yes
            -o "UserKnownHostsFile=$HOME/.ssh/tars_known_hosts"
          )
          target="$SSH_USER@$SSH_HOST"
          {
            cat "$RUNNER_TEMP/tars-deploy-secrets/remote-secrets.sh"
            cat <<'REMOTE'
          set -euo pipefail
          classification=$1
          prior_sha=$2
          target_sha=$3
          if docker config inspect tars_deploy_lock >/dev/null 2>&1; then
            owner="$(docker config inspect tars_deploy_lock \
              --format '{{index .Spec.Labels "tars.owner"}}')"
            test "$owner" = "$target_sha"
            target_bundle="/srv/tars/incoming/$target_sha"
            "$target_bundle/deploy/tars-deploy" unlock \
              --expected-owner "$target_sha"
          fi
          if [ "$classification" = repair-existing ]; then
            release_sha=$prior_sha
          else
            release_sha=$target_sha
          fi
          bundle="/srv/tars/incoming/$release_sha"
          if [ "$classification" = repair-greenfield ]; then
            "$bundle/deploy/tars-deploy" bootstrap-stateful \
              --release-env "$bundle/.release.env" \
              --release-sha "$release_sha" \
              --current-main-sha "$release_sha" \
              --bundle-dir "$bundle"
          fi
          "$bundle/deploy/tars-deploy" deploy \
            --release-env "$bundle/.release.env" \
            --release-sha "$release_sha" \
            --current-main-sha "$release_sha" \
            --bundle-dir "$bundle"
          docker service scale tars_dispatcher=0 >/dev/null
          REMOTE
          } | ssh "${ssh_options[@]}" "$target" /bin/bash -s -- \
            "$CLASSIFICATION" "$PRIOR_SHA" "$TARGET_SHA"

      - name: Verify recovery and retire the interrupted boundary
        if: steps.initial-app.outputs.interrupted == 'true'
        env:
          CLASSIFICATION: ${{ steps.interrupted-app.outputs.classification }}
          PRIOR_SHA: ${{ steps.interrupted.outputs.prior_release_sha }}
          PRIOR_GPU_IMAGE: ${{ steps.interrupted.outputs.prior_gpu_image }}
          TARGET_SHA: ${{ steps.interrupted.outputs.release_sha }}
          TARGET_GPU_IMAGE: ${{ steps.interrupted.outputs.target_image }}
          ENDPOINT_ID: ${{ steps.interrupted.outputs.endpoint_id }}
          SSH_HOST: ${{ steps.connection.outputs.host }}
          SSH_USER: ${{ steps.connection.outputs.user }}
        run: |
          case "$CLASSIFICATION" in
            existing-baseline|repair-existing)
              expected_sha=$PRIOR_SHA
              expected_gpu=$PRIOR_GPU_IMAGE
              ;;
            greenfield-baseline|repair-greenfield)
              expected_sha=$TARGET_SHA
              expected_gpu=$TARGET_GPU_IMAGE
              ;;
            *)
              exit 64
              ;;
          esac
          provider_baseline="$RUNNER_TEMP/tars-recovered-application-boundary.json"
          python3 central/scripts/tars/tars_runpod_release.py \
            prepare-application \
            --release-sha "$expected_sha" \
            --gpu-image "$expected_gpu" \
            --endpoint-id "$ENDPOINT_ID" \
            --boundary-file "$provider_baseline"
          python3 central/scripts/tars/tars_runpod_release.py \
            verify-application \
            --api-key-file "$RUNNER_TEMP/tars-deploy-secrets/RUNPOD_API_KEY" \
            --boundary-file "$provider_baseline" \
            --endpoint-id-file "$RUNNER_TEMP/tars-deploy-secrets/RUNPOD_ENDPOINT_ID" \
            --template-id-file "$RUNNER_TEMP/tars-deploy-secrets/RUNPOD_TEMPLATE_ID" \
            --auth-id-file "$RUNNER_TEMP/tars-deploy-secrets/RUNPOD_REGISTRY_AUTH_ID"
          ssh_options=(
            -i "$HOME/.ssh/tars_key"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
            -o TCPKeepAlive=yes
            -o "UserKnownHostsFile=$HOME/.ssh/tars_known_hosts"
          )
          target="$SSH_USER@$SSH_HOST"
          ssh "${ssh_options[@]}" "$target" /bin/sh -s -- \
            "$CLASSIFICATION" "$PRIOR_SHA" "$PRIOR_GPU_IMAGE" \
            "$TARGET_SHA" "$TARGET_GPU_IMAGE" "$ENDPOINT_ID" <<'REMOTE'
          set -eu
          classification=$1
          prior_sha=$2
          prior_gpu=$3
          target_sha=$4
          target_gpu=$5
          expected_endpoint=$6
          boundary=/srv/tars/deployment/runpod-rollout-boundary.json
          test -f "$boundary"
          test ! -L "$boundary"
          test "$(stat -c '%a' "$boundary")" = 600
          test "$(stat -c '%u' "$boundary")" = "$(id -u)"
          case "$classification" in
            existing-baseline|repair-existing)
              expected_sha=$prior_sha
              expected_gpu=$prior_gpu
              ;;
            repair-greenfield)
              expected_sha=$target_sha
              expected_gpu=$target_gpu
              ;;
            greenfield-baseline)
              for service in tars_nginx tars_api tars_dispatcher tars_otel-collector; do
                ! docker service inspect "$service" >/dev/null 2>&1
              done
              ! docker config inspect tars_deploy_lock >/dev/null 2>&1
              test ! -e /srv/tars/deployment/current.json
              rm -f "$boundary"
              exit 0
              ;;
            *)
              exit 64
              ;;
          esac
          ! docker config inspect tars_deploy_lock >/dev/null 2>&1
          live_sha="$(docker service inspect \
            --format '{{index .Spec.Labels "tars.release.sha"}}' \
            tars_dispatcher)"
          live_gpu="$(docker service inspect \
            --format '{{range .Spec.TaskTemplate.ContainerSpec.Env}}{{println .}}{{end}}' \
            tars_dispatcher | sed -n 's/^TARS_GPU_IMAGE_DIGEST=//p')"
          live_endpoint="$(docker service inspect \
            --format '{{range .Spec.TaskTemplate.ContainerSpec.Env}}{{println .}}{{end}}' \
            tars_dispatcher | sed -n 's/^TARS_RUNPOD_ENDPOINT_ID=//p')"
          test "$live_sha" = "$expected_sha"
          test "$live_gpu" = "$expected_gpu"
          test "$live_endpoint" = "$expected_endpoint"
          recorded_sha="$(python3 -c \
            'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["sha"])' \
            /srv/tars/deployment/current.json)"
          test "$recorded_sha" = "$expected_sha"
          docker service scale tars_dispatcher=1 >/dev/null
          deadline=$(( $(date +%s) + 900 ))
          while :; do
            actual="$(docker service ls --filter name=tars_dispatcher \
              --format '{{.Replicas}}')"
            if [ "$actual" = 1/1 ]; then
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
