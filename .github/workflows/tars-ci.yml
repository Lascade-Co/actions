name: Central TARS CI
run-name: "${{ github.event.client_payload.repo }} · ${{ github.event.client_payload.branch || format('PR #{0}', github.event.client_payload.pr) }}"

on:
  repository_dispatch:
    types: [tars-ci]

permissions:
  contents: read

concurrency:
  group: tars-ci-${{ github.event.client_payload.repo }}-${{ github.event.client_payload.pr }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test pull request merge
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      postgres:
        image: docker.io/library/postgres@sha256:bb377b7239d2774ac8cc76f481596ce96c5a6b5e9d141f6d0a0ee371a6e7c0f2
        env:
          POSTGRES_DB: tars
          POSTGRES_USER: tars
          POSTGRES_PASSWORD: tars-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tars -d tars"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TARS_TEST_DATABASE_URL: postgres://tars:tars-test@127.0.0.1:5432/tars?sslmode=disable
    steps:
      - name: Check out central workflow code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.sha }}
          path: central
          persist-credentials: false

      - name: Validate dispatch payload
        id: payload
        run: >-
          python3 central/scripts/tars/tars_payload.py "$GITHUB_EVENT_PATH"
          --type ci --github-output "$GITHUB_OUTPUT"

      - name: Mint a read-only TARS token
        id: read-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: Lascade-Co
          repositories: TARS
          permission-contents: read

      - name: Check out the exact pull request head with full base history
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ steps.payload.outputs.repo }}
          ref: ${{ steps.payload.outputs.head_sha }}
          token: ${{ steps.read-token.outputs.token }}
          path: source
          fetch-depth: 0
          persist-credentials: false

      - name: Merge current main for collaboration tests
        working-directory: source
        env:
          EXPECTED_HEAD_SHA: ${{ steps.payload.outputs.head_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          git -c user.name='TARS CI' -c user.email='ci@lascade.com' \
            merge --no-commit --no-ff origin/main

      - name: Install Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: source/go.mod
          cache-dependency-path: source/go.sum

      - name: Run merged-tree tests
        working-directory: source
        run: |
          go test -count=1 ./...
          python3 -m unittest discover -s release -p 'test_*.py'
          python3 -m unittest discover -s deploy -p 'test_*.py'
          python3 -m unittest discover -s runpod_worker -p 'test_*.py'

  report:
    name: Report pull request result
    needs: verify
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out central workflow code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.sha }}
          path: central
          persist-credentials: false

      - name: Revalidate dispatch payload
        id: payload
        run: >-
          python3 central/scripts/tars/tars_payload.py "$GITHUB_EVENT_PATH"
          --type ci --github-output "$GITHUB_OUTPUT"

      - name: Mint a status-only TARS token
        id: status-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: Lascade-Co
          repositories: TARS
          permission-statuses: write

      - name: Report TARS Central CI
        env:
          GH_TOKEN: ${{ steps.status-token.outputs.token }}
          TARGET_REPO: ${{ steps.payload.outputs.repo }}
          TARGET_SHA: ${{ steps.payload.outputs.head_sha }}
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: |
          if [ "$VERIFY_RESULT" = success ]; then
            state=success
            description='Merged-tree tests passed'
          else
            state=failure
            description='Merged-tree tests failed'
          fi
          target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh api --method POST "repos/$TARGET_REPO/statuses/$TARGET_SHA" \
            -f "state=$state" \
            -f context='TARS Central CI' \
            -f "description=$description" \
            -f "target_url=$target_url"
