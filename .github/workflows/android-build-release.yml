name: Central Build & Release Android App

on:
  repository_dispatch:
    types: [release-android]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-android-${{ github.event.client_payload.repo }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.repo.outputs.owner }}
      name: ${{ steps.repo.outputs.name }}
      branch: ${{ steps.branch.outputs.branch }}
    steps:
      - name: Extract owner/repo
        id: repo
        run: |
          FULL="${{ github.event.client_payload.repo }}"   # e.g. Lascade-Co/travel-animator-android
          echo "owner=${FULL%%/*}" >> "$GITHUB_OUTPUT"     # Lascade-Co
          echo "name=${FULL#*/}"   >> "$GITHUB_OUTPUT"     # travel-animator-android

  build-aab:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo @ branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: refs/heads/${{ github.event.client_payload.branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Fetch local.properties from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Local-Properties
          export-type: file
          file-output-path: /local.properties

      - name: Clean local.properties
        run: sed -i -e "s/'//g" local.properties

      - name: Fetch keystore secrets as env (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Decode keystore
        run: echo "${{ env.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Decode Google Service JSON
        run: echo "${{ env.SERVICE_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Increment Version Numbers
        id: increment_version
        run: bash increment_version.sh

      - name: Build bundleRelease (AAB)
        run: ./gradlew --no-daemon --configuration-cache bundleRelease

      - name: Upload to Firebase App Distribution
        run: ./gradlew --no-daemon appDistributionUploadRelease || echo "Failed to upload"

      - name: Zip native debug symbols if not pre-zipped
        if: ${{ hashFiles('app/release/native-debug-symbols.zip') == '' }}
        run: |
          if [ -d app/build/outputs/native-debug-symbols/release ]; then
            (cd app/build/outputs/native-debug-symbols/release && zip -r ../../../release/native-debug-symbols.zip .)
          fi

      - name: Upload AAB + symbols
        uses: actions/upload-artifact@v7
        with:
          name: aab
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/release/native-debug-symbols.zip
          if-no-files-found: warn

  build-apk:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo @ branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: refs/heads/${{ github.event.client_payload.branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Fetch local.properties from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Local-Properties
          export-type: file
          file-output-path: /local.properties

      - name: Clean local.properties
        run: sed -i -e "s/'//g" local.properties

      - name: Fetch keystore secrets as env (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Decode keystore
        run: echo "${{ env.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Decode Google Service JSON
        run: echo "${{ env.SERVICE_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Increment Version Numbers
        id: increment_version
        run: bash increment_version.sh

      - name: Build assembleRelease (APK)
        run: ./gradlew --no-daemon --configuration-cache assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: apk
          path: app/build/outputs/apk/release/app-release.apk

  release:
    needs: [prepare, build-aab, build-apk]
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo @ branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: refs/heads/${{ github.event.client_payload.branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Determine HEAD SHA for tag
        id: headsha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Increment Version Numbers
        id: increment_version
        run: bash increment_version.sh
        # Script must: echo "new_version=<ver>" >> "$GITHUB_OUTPUT"

      - name: Download AAB artifact
        uses: actions/download-artifact@v8
        with:
          name: aab

      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: apk

      - name: Check if release notes are outdated
        id: notes
        shell: bash
        run: |
          LAST_TAG=$(git tag --sort=-creatordate | head -1 || true)
          if [ -z "$LAST_TAG" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD)
            echo "No tags found; using initial commit ($BASE) as diff base."
            echo "outdated=true" >> "$GITHUB_OUTPUT"
            echo "base=$BASE" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG_COMMIT=$(git rev-list -1 "$LAST_TAG")
          echo "Last tag: $LAST_TAG ($TAG_COMMIT)"
          echo "base=$TAG_COMMIT" >> "$GITHUB_OUTPUT"
          if [ -f releasenotes.txt ] && [ -n "$(git log "${TAG_COMMIT}..HEAD" --format='%H' -- releasenotes.txt | head -1)" ]; then
            echo "releasenotes.txt has commits since last tag — fresh."
            echo "outdated=false" >> "$GITHUB_OUTPUT"
          else
            echo "releasenotes.txt is missing or stale — outdated."
            echo "outdated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Codex auth.json
        if: steps.notes.outputs.outdated == 'true'
        shell: bash
        env:
          CODEX_AUTH_JSON_BASE_64: ${{ secrets.CODEX_AUTH_JSON_BASE_64 }}
        run: |
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH_JSON_BASE_64" | base64 -d > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

      - name: Build Codex release-notes prompt (inject git diff)
        if: steps.notes.outputs.outdated == 'true'
        shell: bash
        env:
          BASE: ${{ steps.notes.outputs.base }}
        run: |
          curl -sSL https://raw.githubusercontent.com/Lascade-Co/actions/main/data/RELEASE_NOTES.md > codex-release-prompt.md
          {
            echo ""
            echo '```diff'
            git diff "$BASE" HEAD
            echo '```'
          } >> codex-release-prompt.md

      - name: Run Codex to write release notes
        id: codex_notes
        continue-on-error: true
        if: steps.notes.outputs.outdated == 'true'
        uses: openai/codex-action@v1
        with:
          codex-home: ~/.codex
          prompt-file: codex-release-prompt.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Create GitHub Release in source repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.event.client_payload.repo }}
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ steps.increment_version.outputs.new_version }}
          target_commitish: ${{ steps.headsha.outputs.sha }}
          name: Release ${{ steps.increment_version.outputs.new_version }}
          body_path: releasenotes.txt
          files: |
            **/app-release.aab
            **/native-debug-symbols.zip
            app-release.apk

      - name: Commit Version Number Increment and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "[skip ci] Increment version number to ${{ steps.increment_version.outputs.new_version }}" || echo "No changes"
          git push origin HEAD:${{ github.event.client_payload.branch }}
