name: Central Build Debug Flutter

on:
  repository_dispatch:
    types: [build-debug-flutter]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: build-debug-flutter-${{ github.event.client_payload.repo }}-${{ github.event.client_payload.pr }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.repo.outputs.owner }}
      name: ${{ steps.repo.outputs.name }}
      comment-id: ${{ steps.status.outputs.comment-id }}
    steps:
      - name: Extract owner/repo
        id: repo
        shell: bash
        run: |
          FULL="${{ github.event.client_payload.repo }}"
          echo "owner=${FULL%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${FULL#*/}"   >> "$GITHUB_OUTPUT"

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ steps.repo.outputs.owner }}
          repositories: ${{ steps.repo.outputs.name }}

      - name: Purge previous comments from this workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const [owner, repo] = "${{ github.event.client_payload.repo }}".split("/");
            const issue_number = Number("${{ github.event.client_payload.pr }}");
            const marker = "<!-- central-build-debug-flutter -->";
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            let deleted = 0;
            for (const c of comments) {
              if ((c.body || "").includes(marker)) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
                deleted++;
              }
            }
            core.info(`Deleted ${deleted} prior central-build-debug-flutter comments`);

      - name: Comment on PR about build status
        uses: peter-evans/create-or-update-comment@v4
        id: status
        with:
          edit-mode: 'replace'
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.event.client_payload.repo }}
          issue-number: ${{ github.event.client_payload.pr }}
          body: |
            <!-- central-build-debug-flutter -->
            Building debug APK (Android) and IPA (iOS)...
            Watch progress [here](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo at PR HEAD
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: refs/pull/${{ github.event.client_payload.pr }}/head
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Fetch .env from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: file
          file-output-path: /.env

      - name: Decode keystore
        run: echo "${{ env.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore-debug.jks

      - name: Decode google-services.json
        run: echo "${{ env.SERVICE_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Android build
        uses: actions/cache@v4
        with:
          path: |
            build/
            android/.gradle
          key: android-build-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: android-build-

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm64
        env:
          KEYSTORE_PASSWORD_DEBUG: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS_DEBUG: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD_DEBUG: ${{ env.KEY_PASSWORD }}

      - name: Upload APK to Firebase App Distribution
        run: |
          echo "${{ env.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=sa.json
          npm install -g firebase-tools
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-debug.apk \
            --app "${{ env.FIREBASE_APP_ID_ANDROID }}" || echo "Failed to upload to Firebase"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-ios:
    needs: prepare
    runs-on: macos-15
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo at PR HEAD
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: refs/pull/${{ github.event.client_payload.pr }}/head
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Fetch .env from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: file
          file-output-path: /.env

      - name: Decode GoogleService-Info.plist
        run: echo "${{ env.SERVICE_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Install Apple certificate and provisioning profiles
        run: |
          # Decode cert and profiles
          echo "${{ env.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          echo "${{ env.IOS_PROVISION_PROFILE_BASE64 }}" | base64 --decode > app.mobileprovision
          echo "${{ env.IOS_NSE_PROVISION_PROFILE_BASE64 }}" | base64 --decode > nse.mobileprovision

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "temp_password" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp_password" $KEYCHAIN_PATH
          security import certificate.p12 -k $KEYCHAIN_PATH -P "${{ env.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp_password" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | sed 's/"//g' | tr '\n' ' ')

          # Install provisioning profiles (both paths for Xcode 16+ compatibility)
          PROFILE_DIR_LEGACY=~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_DIR_NEW=~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          mkdir -p "$PROFILE_DIR_LEGACY" "$PROFILE_DIR_NEW"

          APP_UUID=$(security cms -D -i app.mobileprovision | plutil -extract UUID raw -)
          APP_NAME=$(security cms -D -i app.mobileprovision | plutil -extract Name raw -)
          cp app.mobileprovision "$PROFILE_DIR_LEGACY/$APP_UUID.mobileprovision"
          cp app.mobileprovision "$PROFILE_DIR_NEW/$APP_UUID.mobileprovision"
          echo "APP_PROFILE_UUID=$APP_UUID" >> $GITHUB_ENV
          echo "APP_PROFILE_NAME=$APP_NAME" >> $GITHUB_ENV

          NSE_UUID=$(security cms -D -i nse.mobileprovision | plutil -extract UUID raw -)
          NSE_NAME=$(security cms -D -i nse.mobileprovision | plutil -extract Name raw -)
          cp nse.mobileprovision "$PROFILE_DIR_LEGACY/$NSE_UUID.mobileprovision"
          cp nse.mobileprovision "$PROFILE_DIR_NEW/$NSE_UUID.mobileprovision"
          echo "NSE_PROFILE_UUID=$NSE_UUID" >> $GITHUB_ENV
          echo "NSE_PROFILE_NAME=$NSE_NAME" >> $GITHUB_ENV

          # Cleanup decoded files
          rm certificate.p12 app.mobileprovision nse.mobileprovision

      - name: Switch Xcode project to manual signing
        run: |
          PROJECT="ios/Runner.xcodeproj/project.pbxproj"

          # Disable automatic signing for all targets
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PROJECT"

          # Set code sign identity to distribution
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' "$PROJECT"

          # Set per-target provisioning profiles (Runner vs NSE need different profiles)
          # PROVISIONING_PROFILE_SPECIFIER requires profile NAME (not UUID)
          python3 << 'PYEOF'
          import os

          path = "ios/Runner.xcodeproj/project.pbxproj"
          app_name = os.environ["APP_PROFILE_NAME"]
          nse_name = os.environ["NSE_PROFILE_NAME"]

          with open(path) as f:
              lines = f.readlines()

          in_settings = False
          depth = 0
          block = []
          is_nse = False
          result = []

          for line in lines:
              if not in_settings:
                  if "buildSettings = {" in line:
                      in_settings = True
                      depth = line.count("{") - line.count("}")
                      block = [line]
                      is_nse = False
                      continue
                  result.append(line)
              else:
                  depth += line.count("{") - line.count("}")
                  block.append(line)
                  if "OneSignalNotificationServiceExtension" in line:
                      is_nse = True
                  if depth <= 0:
                      name = nse_name if is_nse else app_name
                      for bl in block:
                          result.append(
                              bl.replace(
                                  'PROVISIONING_PROFILE_SPECIFIER = ""',
                                  f'PROVISIONING_PROFILE_SPECIFIER = "{name}"',
                              )
                          )
                      in_settings = False
                      block = []

          result.extend(block)

          with open(path, "w") as f:
              f.writelines(result)
          PYEOF

      - name: Generate ExportOptions.plist
        run: |
          /usr/libexec/PlistBuddy -c "Clear dict" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string release-testing" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string ${{ env.IOS_TEAM_ID }}" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${{ env.IOS_BUNDLE_ID }} string ${{ env.APP_PROFILE_UUID }}" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${{ env.IOS_BUNDLE_ID }}.OneSignalNotificationServiceExtension string ${{ env.NSE_PROFILE_UUID }}" ExportOptions.plist

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: build/ios
          key: xcode-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'ios/Podfile.lock') }}
          restore-keys: xcode-${{ runner.os }}-

      - name: Build IPA
        run: flutter build ipa --export-options-plist=ExportOptions.plist

      - name: Upload IPA to Firebase App Distribution
        run: |
          echo "${{ env.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=sa.json
          npm install -g firebase-tools
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          firebase appdistribution:distribute "$IPA_PATH" \
            --app "${{ env.FIREBASE_APP_ID_IOS }}" || echo "Failed to upload to Firebase"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/ios/ipa/*.ipa

  notify:
    needs: [prepare, build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Download APK artifact
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts/

      - name: Download IPA artifact
        if: needs.build-ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ipa
          path: artifacts/

      - name: Create debug release in source repo
        if: needs.build-android.result == 'success' && needs.build-ios.result == 'success'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.event.client_payload.repo }}
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ format('debug-pr-{0}', github.event.client_payload.pr) }}
          name: ${{ github.event.client_payload.title || 'Debug Build' }}
          prerelease: true
          files: artifacts/*

      - name: Comment on PR with download link
        if: needs.build-android.result == 'success' && needs.build-ios.result == 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.event.client_payload.repo }}
          issue-number: ${{ github.event.client_payload.pr }}
          comment-id: ${{ needs.prepare.outputs.comment-id }}
          edit-mode: 'replace'
          body: |
            <!-- central-build-debug-flutter -->
            Debug builds are ready: [Download](${{ steps.create_release.outputs.url }})
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Telegram notification
        if: needs.build-android.result == 'success' && needs.build-ios.result == 'success'
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ env.TELEGRAM_CHAT_ID }}
          token: ${{ env.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *Debug Build Ready*

            PR: ${{ github.event.client_payload.title || 'Debug Build' }}
            [Download](${{ steps.create_release.outputs.url }})

      - name: Comment on PR if any build failed
        if: needs.build-android.result == 'failure' || needs.build-ios.result == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const androidResult = "${{ needs.build-android.result }}";
            const iosResult = "${{ needs.build-ios.result }}";

            let reason;
            if (androidResult === "failure" && iosResult === "failure") {
              reason = "Android and iOS builds";
            } else if (androidResult === "failure") {
              reason = "Android build";
            } else {
              reason = "iOS build";
            }

            const [owner, repo] = "${{ github.event.client_payload.repo }}".split("/");
            const body = [
              "<!-- central-build-debug-flutter -->",
              `**${reason}** failed.`,
              `[Check logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join("\n");

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: Number("${{ needs.prepare.outputs.comment-id }}"),
              body,
            });
