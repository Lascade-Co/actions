name: Central Build Debug Flutter

on:
  repository_dispatch:
    types: [build-debug-flutter]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: build-debug-flutter-${{ github.event.client_payload.repo }}-${{ github.event.client_payload.pr }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.repo.outputs.owner }}
      name: ${{ steps.repo.outputs.name }}
      comment-id: ${{ steps.status.outputs.comment-id }}
    steps:
      - name: Extract owner/repo
        id: repo
        shell: bash
        run: |
          FULL="${{ github.event.client_payload.repo }}"
          echo "owner=${FULL%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${FULL#*/}"   >> "$GITHUB_OUTPUT"

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ steps.repo.outputs.owner }}
          repositories: ${{ steps.repo.outputs.name }}

      - name: Purge previous comments from this workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const [owner, repo] = "${{ github.event.client_payload.repo }}".split("/");
            const issue_number = Number("${{ github.event.client_payload.pr }}");
            const marker = "<!-- central-build-debug-flutter -->";
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            let deleted = 0;
            for (const c of comments) {
              if ((c.body || "").includes(marker)) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
                deleted++;
              }
            }
            core.info(`Deleted ${deleted} prior central-build-debug-flutter comments`);

      - name: Comment on PR about build status
        uses: peter-evans/create-or-update-comment@v4
        id: status
        with:
          edit-mode: 'replace'
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.event.client_payload.repo }}
          issue-number: ${{ github.event.client_payload.pr }}
          body: |
            <!-- central-build-debug-flutter -->
            Building debug APK (Android) and IPA (iOS)...
            Watch progress [here](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo at PR HEAD
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: refs/pull/${{ github.event.client_payload.pr }}/head
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Fetch .env from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: file
          file-output-path: /.env

      - name: Decode keystore
        run: echo "${{ env.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore-debug.jks

      - name: Decode google-services.json
        run: echo "${{ env.SERVICE_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Android project Gradle
        id: android-project-gradle-cache
        uses: actions/cache@v4
        with:
          path: android/.gradle/
          key: android-project-gradle-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            android-project-gradle-${{ runner.os }}-

      - name: Flutter pub get
        id: android-pub-get
        shell: bash
        run: |
          start=$(date +%s)
          flutter pub get
          duration=$(( $(date +%s) - start ))
          echo "duration=${duration}" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        id: android-build
        shell: bash
        run: |
          start=$(date +%s)
          flutter build apk --debug --target-platform android-arm64 --no-pub --android-project-cache-dir=.gradle
          duration=$(( $(date +%s) - start ))
          echo "duration=${duration}" >> "$GITHUB_OUTPUT"
        env:
          KEYSTORE_PASSWORD_DEBUG: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS_DEBUG: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD_DEBUG: ${{ env.KEY_PASSWORD }}

      - name: Summarize Android timings
        if: always()
        shell: bash
        env:
          ANDROID_GRADLE_CACHE_HIT: ${{ steps.android-project-gradle-cache.outputs.cache-hit || 'false' }}
          ANDROID_PUB_GET_DURATION: ${{ steps.android-pub-get.outputs.duration || 'n/a' }}
          ANDROID_BUILD_DURATION: ${{ steps.android-build.outputs.duration || 'n/a' }}
        run: |
          summary_target="${GITHUB_STEP_SUMMARY:-/dev/null}"
          {
            printf '### Android Debug Build\n\n'
            printf -- '- Project Gradle cache hit: %s\n' "$ANDROID_GRADLE_CACHE_HIT"
            printf -- '- flutter pub get: %ss\n' "$ANDROID_PUB_GET_DURATION"
            printf -- '- flutter build apk: %ss\n' "$ANDROID_BUILD_DURATION"
          } | tee -a "$summary_target"

      - name: Upload APK to Firebase App Distribution
        run: |
          echo "${{ env.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=sa.json
          npm install -g firebase-tools
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-debug.apk \
            --app "${{ env.FIREBASE_APP_ID_ANDROID }}" \
            --groups "qa" || echo "Failed to upload to Firebase"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          compression-level: 0

  build-ios:
    needs: prepare
    runs-on: macos-latest
    env:
      COCOAPODS_DISABLE_STATS: "true"
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo at PR HEAD
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: refs/pull/${{ github.event.client_payload.pr }}/head
          token: ${{ steps.app-token.outputs.token }}

      - name: Capture Xcode version
        id: xcode-version
        shell: bash
        run: |
          version="$(xcodebuild -version | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/ $//')"
          key="$(printf '%s' "$version" | shasum -a 256 | cut -d' ' -f1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "cache-key=$key" >> "$GITHUB_OUTPUT"

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Fetch .env from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: file
          file-output-path: /.env

      - name: Decode GoogleService-Info.plist
        run: echo "${{ env.SERVICE_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Install Apple certificate and provisioning profiles
        run: curl -sSL https://raw.githubusercontent.com/Lascade-Co/actions/main/scripts/install_apple_cert.sh | bash

      - name: Switch Xcode project to manual signing
        run: curl -sSL https://raw.githubusercontent.com/Lascade-Co/actions/main/scripts/fix_ios_signing.py | python3 -

      - name: Generate ExportOptions.plist
        run: |
          /usr/libexec/PlistBuddy -c "Clear dict" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string release-testing" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string ${{ env.IOS_TEAM_ID }}" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${{ env.IOS_BUNDLE_ID }} string ${{ env.APP_PROFILE_UUID }}" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${{ env.IOS_BUNDLE_ID }}.OneSignalNotificationServiceExtension string ${{ env.NSE_PROFILE_UUID }}" ExportOptions.plist

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache CocoaPods
        id: ios-cocoapods-cache
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: pods-${{ runner.os }}-${{ steps.xcode-version.outputs.cache-key }}-${{ hashFiles('ios/Podfile', 'ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-${{ steps.xcode-version.outputs.cache-key }}-
            pods-${{ runner.os }}-

      - name: Flutter pub get
        id: ios-pub-get
        shell: bash
        run: |
          start=$(date +%s)
          flutter pub get
          duration=$(( $(date +%s) - start ))
          echo "duration=${duration}" >> "$GITHUB_OUTPUT"

      - name: Build IPA
        id: ios-build
        shell: bash
        run: |
          start=$(date +%s)
          flutter build ipa --export-options-plist=ExportOptions.plist --no-pub
          duration=$(( $(date +%s) - start ))
          echo "duration=${duration}" >> "$GITHUB_OUTPUT"

      - name: Summarize iOS timings
        if: always()
        shell: bash
        env:
          IOS_XCODE_VERSION: ${{ steps.xcode-version.outputs.version || 'unknown' }}
          IOS_COCOAPODS_CACHE_HIT: ${{ steps.ios-cocoapods-cache.outputs.cache-hit || 'false' }}
          IOS_PUB_GET_DURATION: ${{ steps.ios-pub-get.outputs.duration || 'n/a' }}
          IOS_BUILD_DURATION: ${{ steps.ios-build.outputs.duration || 'n/a' }}
        run: |
          summary_target="${GITHUB_STEP_SUMMARY:-/dev/null}"
          {
            printf '### iOS Debug Build\n\n'
            printf -- '- Xcode: %s\n' "$IOS_XCODE_VERSION"
            printf -- '- CocoaPods cache hit: %s\n' "$IOS_COCOAPODS_CACHE_HIT"
            printf -- '- flutter pub get: %ss\n' "$IOS_PUB_GET_DURATION"
            printf -- '- flutter build ipa: %ss\n' "$IOS_BUILD_DURATION"
          } | tee -a "$summary_target"

      - name: Upload IPA to Firebase App Distribution
        run: |
          echo "${{ env.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=sa.json
          npm install -g firebase-tools
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          firebase appdistribution:distribute "$IPA_PATH" \
            --app "${{ env.FIREBASE_APP_ID_IOS }}" \
            --groups "qa" || echo "Failed to upload to Firebase"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/ios/ipa/*.ipa
          compression-level: 0

  notify:
    needs: [prepare, build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "staging"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Download APK artifact
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts/

      - name: Download IPA artifact
        if: needs.build-ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ipa
          path: artifacts/

      - name: Create debug release in source repo
        if: needs.build-android.result == 'success' && needs.build-ios.result == 'success'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.event.client_payload.repo }}
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ format('debug-pr-{0}', github.event.client_payload.pr) }}
          name: ${{ github.event.client_payload.title || 'Debug Build' }}
          prerelease: true
          files: artifacts/*

      - name: Comment on PR with download link
        if: needs.build-android.result == 'success' && needs.build-ios.result == 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.event.client_payload.repo }}
          issue-number: ${{ github.event.client_payload.pr }}
          comment-id: ${{ needs.prepare.outputs.comment-id }}
          edit-mode: 'replace'
          body: |
            <!-- central-build-debug-flutter -->
            Debug builds are ready: [Download](${{ steps.create_release.outputs.url }})
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Telegram notification
        if: needs.build-android.result == 'success' && needs.build-ios.result == 'success'
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ env.TELEGRAM_CHAT_ID }}
          token: ${{ env.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *Debug Build Ready*

            PR: ${{ github.event.client_payload.title || 'Debug Build' }}
            [Download](${{ steps.create_release.outputs.url }})

      - name: Comment on PR if any build failed
        if: needs.build-android.result == 'failure' || needs.build-ios.result == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const androidResult = "${{ needs.build-android.result }}";
            const iosResult = "${{ needs.build-ios.result }}";

            let reason;
            if (androidResult === "failure" && iosResult === "failure") {
              reason = "Android and iOS builds";
            } else if (androidResult === "failure") {
              reason = "Android build";
            } else {
              reason = "iOS build";
            }

            const [owner, repo] = "${{ github.event.client_payload.repo }}".split("/");
            const body = [
              "<!-- central-build-debug-flutter -->",
              `**${reason}** failed.`,
              `[Check logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join("\n");

            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: Number("${{ needs.prepare.outputs.comment-id }}"),
              body,
            });
