name: Central Build & Release Flutter

on:
  repository_dispatch:
    types: [release-flutter]

permissions:
  contents: write

concurrency:
  group: release-flutter-${{ github.event.client_payload.repo }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.increment_version.outputs.new_version }}
      owner: ${{ steps.repo.outputs.owner }}
      name: ${{ steps.repo.outputs.name }}
      package_name: ${{ steps.app_meta.outputs.package_name }}
      app_name: ${{ steps.app_meta.outputs.app_name }}
      commit_sha: ${{ steps.push.outputs.commit_sha }}
      is_travel_app: ${{ steps.flags.outputs.is_travel_app }}
      dart_define_method: ${{ steps.flags.outputs.dart_define_method }}
    steps:
      - name: Extract owner/repo
        id: repo
        shell: bash
        run: |
          FULL="${{ github.event.client_payload.repo }}"
          echo "owner=${FULL%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${FULL#*/}"   >> "$GITHUB_OUTPUT"

      - name: Resolve flags
        id: flags
        shell: bash
        run: |
          RAW_TRAVEL="${{ github.event.client_payload.is_travel_app }}"
          if [ "$RAW_TRAVEL" = "true" ]; then
            echo "is_travel_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_travel_app=false" >> "$GITHUB_OUTPUT"
          fi

          RAW_DART="${{ github.event.client_payload.dart_define_method }}"
          if [ "$RAW_DART" = "true" ]; then
            echo "dart_define_method=true" >> "$GITHUB_OUTPUT"
          else
            echo "dart_define_method=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ steps.repo.outputs.owner }}
          repositories: ${{ steps.repo.outputs.name }}

      - name: Checkout target repo @ branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: refs/heads/${{ github.event.client_payload.branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Increment version
        id: increment_version
        run: bash increment_version.sh

      - name: Extract app metadata
        id: app_meta
        shell: bash
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            GRADLE_FILE=android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            GRADLE_FILE=android/app/build.gradle
          else
            echo "::error::No android/app/build.gradle or build.gradle.kts found"
            exit 1
          fi
          PACKAGE_NAME=$(python3 -c 'import re,sys
          text=open(sys.argv[1]).read()
          m=re.search(r"^[ \t]*applicationId(?=[\s=])[^\n]*(?:\n[ \t]*\?:[^\n]*)*", text, re.M)
          block=m.group(0) if m else ""
          strings=re.findall(r"[\"\x27]([^\"\x27]+)[\"\x27]", block)
          pkg=strings[-1] if strings else ""
          if not re.match(r"^[A-Za-z][A-Za-z0-9_]*(\.[A-Za-z][A-Za-z0-9_]*)+$", pkg): sys.exit("could not extract a valid applicationId from " + sys.argv[1] + " (got: " + repr(pkg) + ")")
          print(pkg)' "$GRADLE_FILE")
          APP_NAME=$(grep -oP '^name:\s*\K\S+' pubspec.yaml || true)
          if [ -z "$APP_NAME" ]; then
            echo "::error::Could not extract app name from pubspec.yaml"
            exit 1
          fi
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and push
        id: push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "[skip ci] Increment version to ${{ steps.increment_version.outputs.new_version }}" || echo "No changes"
          git push origin HEAD:${{ github.event.client_payload.branch }}
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo @ version-bumped commit
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ needs.prepare.outputs.commit_sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch build secrets from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Fetch ENV_JSON_BASE64 from Infisical (dart-define mode)
        if: needs.prepare.outputs.dart_define_method == 'true'
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: env

      - name: Fetch .env from Infisical (flutter_dotenv mode)
        if: needs.prepare.outputs.dart_define_method != 'true'
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: file
          file-output-path: /.env

      - name: Decode keystore
        run: echo "${{ env.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Decode google-services.json
        run: echo "${{ env.SERVICE_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Determine build mode (dart-define vs .env)
        id: build-mode
        if: needs.prepare.outputs.dart_define_method == 'true'
        shell: bash
        run: |
          echo "${{ env.ENV_JSON_BASE64 }}" | base64 --decode > env.json
          echo "dart_define_args=--dart-define-from-file=env.json" >> "$GITHUB_OUTPUT"
          echo "Using dart-define mode (env.json)"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-overwrite-existing: true
          cache-read-only: false

      - name: Read .flutter-version
        id: flutter-version
        shell: bash
        run: |
          if [ -f .flutter-version ]; then
            echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: stable
          cache: true

      - name: Cache Android project Gradle
        uses: actions/cache@v5
        with:
          path: android/.gradle/
          key: android-project-gradle-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            android-project-gradle-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release --no-pub --android-project-cache-dir=.gradle ${{ steps.build-mode.outputs.dart_define_args }}
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"
          STORE_FILE: ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Build release APK
        if: needs.prepare.outputs.is_travel_app == 'true'
        run: flutter build apk --release --no-pub --android-project-cache-dir=.gradle ${{ steps.build-mode.outputs.dart_define_args }}
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"
          STORE_FILE: ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Zip native debug symbols if not pre-zipped
        run: |
          SYMBOLS_DIR="build/app/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib"
          OUTPUT_DIR="build/app/outputs/bundle/release"
          if [ ! -f "${OUTPUT_DIR}/native-debug-symbols.zip" ] && [ -d "$SYMBOLS_DIR" ]; then
            (cd "$SYMBOLS_DIR" && zip -r "${GITHUB_WORKSPACE}/${OUTPUT_DIR}/native-debug-symbols.zip" .)
          fi

      - name: Ensure release notes file
        run: |
          if [ ! -f releasenotes.txt ]; then
            printf "Bug fixes and improvements\n" > releasenotes.txt
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/bundle/release/native-debug-symbols.zip
            build/app/outputs/flutter-apk/app-release.apk
            releasenotes.txt
          if-no-files-found: error

  build-ios:
    needs: prepare
    runs-on: macos-26
    env:
      COCOAPODS_DISABLE_STATS: "true"
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo @ version-bumped commit
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ needs.prepare.outputs.commit_sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Capture Xcode version
        id: xcode-version
        shell: bash
        run: |
          version="$(xcodebuild -version | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/ $//')"
          key="$(printf '%s' "$version" | shasum -a 256 | cut -d' ' -f1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "cache-key=$key" >> "$GITHUB_OUTPUT"

      - name: Fetch build secrets from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Fetch ENV_JSON_BASE64 from Infisical (dart-define mode)
        if: needs.prepare.outputs.dart_define_method == 'true'
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: env

      - name: Fetch .env from Infisical (flutter_dotenv mode)
        if: needs.prepare.outputs.dart_define_method != 'true'
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: file
          file-output-path: /.env

      - name: Decode GoogleService-Info.plist
        run: echo "${{ env.SERVICE_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Determine build mode (dart-define vs .env)
        id: build-mode
        if: needs.prepare.outputs.dart_define_method == 'true'
        shell: bash
        run: |
          echo "${{ env.ENV_JSON_BASE64 }}" | base64 --decode > env.json
          echo "dart_define_args=--dart-define-from-file=env.json" >> "$GITHUB_OUTPUT"
          echo "Using dart-define mode (env.json)"

      - name: Install Apple certificate and provisioning profiles
        run: curl -sSL https://raw.githubusercontent.com/Lascade-Co/actions/main/scripts/install_apple_cert.sh | bash

      - name: Install additional provisioning profiles
        shell: bash
        run: |
          PROFILES_DIR_LEGACY="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILES_DIR_NEW="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR_LEGACY" "$PROFILES_DIR_NEW"

          install_extra_profile() {
            local b64_var="$1" env_var="$2" label="$3"
            local b64_value="${!b64_var:-}"
            if [ -n "$b64_value" ]; then
              TEMP_PROFILE=$(mktemp)
              echo "$b64_value" | base64 --decode > "$TEMP_PROFILE"
              DECODED=$(security cms -D -i "$TEMP_PROFILE")
              UUID=$(echo "$DECODED" | plutil -extract UUID raw -)
              NAME=$(echo "$DECODED" | plutil -extract Name raw -)
              cp "$TEMP_PROFILE" "$PROFILES_DIR_LEGACY/$UUID.mobileprovision"
              cp "$TEMP_PROFILE" "$PROFILES_DIR_NEW/$UUID.mobileprovision"
              rm -f "$TEMP_PROFILE"
              echo "${env_var}_UUID=$UUID" >> "$GITHUB_ENV"
              echo "${env_var}_NAME=$NAME" >> "$GITHUB_ENV"
              echo "Installed $label profile: $NAME ($UUID)"
            fi
          }

          install_extra_profile IOS_SHARE_EXT_PROVISION_PROFILE_BASE64             SHARE_EXT_PROFILE    "share extension"
          install_extra_profile IOS_LIVE_ACTIVITY_APPSTORE_PROVISION_PROFILE_BASE64 LIVE_ACTIVITY_PROFILE "live activity widget"

      - name: Switch Xcode project to manual signing
        run: curl -sSL https://raw.githubusercontent.com/Lascade-Co/actions/main/scripts/fix_ios_signing.py | python3 -

      - name: Generate ExportOptions.plist
        shell: bash
        run: |
          /usr/libexec/PlistBuddy -c "Clear dict" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string ${{ env.IOS_TEAM_ID }}" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" ExportOptions.plist
          # Map each installed profile to its real bundle id (read from the
          # profile's application-identifier). Generic + app-agnostic: existing
          # apps derive the same bundle ids they had hardcoded; widget/watch and
          # any future extension are handled automatically. Empty UUID -> skipped.
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          add_pp() {
            local uuid="$1"; [ -z "$uuid" ] && return 0
            local appid bundle
            appid=$(security cms -D -i "$PROFILE_DIR/$uuid.mobileprovision" | plutil -extract Entitlements.application-identifier raw -)
            bundle="${appid#*.}"   # strip "TEAMID." prefix
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${bundle} string ${uuid}" ExportOptions.plist
            echo "Mapped $bundle -> $uuid"
          }
          add_pp "${{ env.APP_PROFILE_UUID }}"
          add_pp "${{ env.NSE_PROFILE_UUID }}"
          add_pp "${{ env.SHARE_EXT_PROFILE_UUID }}"
          add_pp "${{ env.LIVE_ACTIVITY_PROFILE_UUID }}"
          add_pp "${{ env.WIDGET_PROFILE_UUID }}"
          add_pp "${{ env.WATCH_PROFILE_UUID }}"

      - name: Read .flutter-version
        id: flutter-version
        shell: bash
        run: |
          if [ -f .flutter-version ]; then
            echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: stable
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: pods-${{ runner.os }}-${{ steps.xcode-version.outputs.cache-key }}-${{ hashFiles('ios/Podfile', 'ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-${{ steps.xcode-version.outputs.cache-key }}-
            pods-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release IPA
        run: flutter build ipa --export-options-plist=ExportOptions.plist --no-pub ${{ steps.build-mode.outputs.dart_define_args }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

  publish-android:
    if: needs.prepare.outputs.is_travel_app != 'true'
    needs: [prepare, build-android]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      TRACK: production
      TARGET_COUNTRY: BD
      TARGET_FRACTION: "0.99"

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: android-release

      - name: Locate AAB + native debug symbols
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          AAB=$(find . -name "*.aab" | head -n 1)
          SYM=$(find . -iname "*native-debug-symbols*.zip" | head -n 1)
          : "${AAB:?Missing AAB}"
          : "${SYM:?Missing native debug symbols zip}"
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"
          echo "symbols=$SYM" >> "$GITHUB_OUTPUT"

      - name: Prepare whatsnew
        shell: bash
        run: |
          mkdir -p whatsnew
          NOTES=$(cat releasenotes.txt 2>/dev/null || echo "Bug fixes and improvements")
          echo "$NOTES" > whatsnew/whatsnew-en-US
          echo "$NOTES" > release_notes_raw.txt

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Publish to Play Store
        env:
          SA_B64: ${{ secrets.SUBSCRIPTION_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          echo "$SA_B64" | base64 --decode > play-sa.json

          curl -sSfL https://raw.githubusercontent.com/Lascade-Co/actions/main/scripts/publish_playstore.py -o publish_playstore.py

          python3 publish_playstore.py \
            --service-account-json play-sa.json \
            --package-name "${{ needs.prepare.outputs.package_name }}" \
            --track "${{ env.TRACK }}" \
            --aab "${{ steps.assets.outputs.aab }}" \
            --native-symbols "${{ steps.assets.outputs.symbols }}" \
            --release-name "${{ needs.prepare.outputs.version }}" \
            --notes-file "whatsnew/whatsnew-en-US" \
            --raw-notes-file "release_notes_raw.txt" \
            --app-name "${{ needs.prepare.outputs.app_name }}" \
            --country "${{ env.TARGET_COUNTRY }}" \
            --user-fraction "${{ env.TARGET_FRACTION }}" \
            --telegram-out "github_release_body.txt"

      - name: Notify Telegram (success)
        uses: appleboy/telegram-action@v1.0.1
        with:
          token: ${{ secrets.SUBSCRIPTION_TELEGRAM_TOKEN }}
          to: ${{ secrets.SUBSCRIPTION_TELEGRAM_TO }}
          format: html
          message_file: github_release_body.txt
          disable_web_page_preview: true

      - name: Create PostHog annotation
        if: github.event.client_payload.posthog_project_id != ''
        shell: bash
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
        run: |
          set -euo pipefail
          curl -sf -X POST \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $POSTHOG_API_KEY" \
            "https://us.posthog.com/api/projects/${{ github.event.client_payload.posthog_project_id }}/annotations/" \
            -d "$(jq -n \
              --arg content "Android ${{ needs.prepare.outputs.version }} released" \
              --arg date "$(date -u +%Y-%m-%dT%H:%M:%S%z)" \
              '{content: $content, date_marker: $date, scope: "project"}')"

      - name: Notify Telegram (FAILURE)
        if: failure()
        continue-on-error: true
        uses: appleboy/telegram-action@v1.0.1
        with:
          token: ${{ secrets.SUBSCRIPTION_TELEGRAM_TOKEN }}
          to: ${{ secrets.SUBSCRIPTION_TELEGRAM_TO }}
          format: html
          disable_web_page_preview: true
          message: |
            <b>Play Store publish failed</b>

            <b>App:</b> ${{ needs.prepare.outputs.app_name }}
            <b>Repo:</b> <code>${{ github.event.client_payload.repo }}</code>

            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
              View logs
            </a>

  publish-android-github:
    if: needs.prepare.outputs.is_travel_app == 'true'
    needs: [prepare, build-android]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: android-release

      - name: Locate AAB + APK + native debug symbols
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          AAB=$(find . -name "*.aab" | head -n 1)
          APK=$(find . -name "*.apk" | head -n 1)
          SYM=$(find . -iname "*native-debug-symbols*.zip" | head -n 1)
          : "${AAB:?Missing AAB}"
          : "${APK:?Missing APK}"
          : "${SYM:?Missing native debug symbols zip}"
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          echo "symbols=$SYM" >> "$GITHUB_OUTPUT"

      - name: Read release notes
        id: notes
        shell: bash
        run: |
          if [ -f releasenotes.txt ]; then
            NOTES=$(cat releasenotes.txt)
          else
            NOTES="Bug fixes and improvements"
          fi
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release on target repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.event.client_payload.repo }}
          token: ${{ steps.app-token.outputs.token }}
          tag_name: v${{ needs.prepare.outputs.version }}
          target_commitish: ${{ needs.prepare.outputs.commit_sha }}
          name: v${{ needs.prepare.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            ${{ steps.assets.outputs.aab }}
            ${{ steps.assets.outputs.apk }}
            ${{ steps.assets.outputs.symbols }}

  publish-ios:
    needs: [prepare, build-ios]
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v8
        with:
          name: ios-release

      - name: Locate and rename IPA
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          IPA=$(find . -maxdepth 2 -name "*.ipa" | head -n 1)
          : "${IPA:?Missing IPA}"
          mv "$IPA" app-release.ipa

      - name: Fetch TestFlight secrets from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Upload to TestFlight
        env:
          INFISICAL_KEY_ID: ${{ env.APPSTORE_API_KEY_ID }}
          INFISICAL_PRIVATE_KEY: ${{ env.APPSTORE_API_PRIVATE_KEY }}
          INFISICAL_ISSUER_ID: ${{ env.APPSTORE_ISSUER_ID }}
          FALLBACK_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          FALLBACK_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          FALLBACK_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -n "$INFISICAL_KEY_ID" ] && [ -n "$INFISICAL_PRIVATE_KEY" ] && [ -n "$INFISICAL_ISSUER_ID" ]; then
            KEY_ID="$INFISICAL_KEY_ID"
            PRIVATE_KEY="$INFISICAL_PRIVATE_KEY"
            ISSUER_ID="$INFISICAL_ISSUER_ID"
            echo "Using TestFlight credentials from Infisical"
          else
            KEY_ID="$FALLBACK_KEY_ID"
            PRIVATE_KEY="$FALLBACK_PRIVATE_KEY"
            ISSUER_ID="$FALLBACK_ISSUER_ID"
            echo "Using TestFlight credentials from GitHub Secrets (default)"
          fi
          mkdir -p ~/private_keys
          echo "$PRIVATE_KEY" > ~/private_keys/AuthKey_${KEY_ID}.p8
          xcrun altool --upload-app \
            -f app-release.ipa \
            --type ios \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Notify Telegram (success)
        if: needs.prepare.outputs.is_travel_app != 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.SUBSCRIPTION_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.SUBSCRIPTION_TELEGRAM_TO }}
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=html \
            -d disable_web_page_preview=true \
            -d text="$(cat <<'MSG'
          <b>iOS build published to TestFlight</b>

          <b>App:</b> ${{ needs.prepare.outputs.app_name }}
          <b>Version:</b> ${{ needs.prepare.outputs.version }}
          MSG
          )"

      - name: Notify Telegram (FAILURE)
        if: failure() && needs.prepare.outputs.is_travel_app != 'true'
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.SUBSCRIPTION_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.SUBSCRIPTION_TELEGRAM_TO }}
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=html \
            -d disable_web_page_preview=true \
            -d text="$(cat <<'MSG'
          <b>App Store publish failed</b>

          <b>App:</b> ${{ needs.prepare.outputs.app_name }}
          <b>Repo:</b> <code>${{ github.event.client_payload.repo }}</code>

          <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View logs</a>
          MSG
          )"