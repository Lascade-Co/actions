name: Central Build & Release Flutter (Travel)

on:
  repository_dispatch:
    types: [release-flutter-travel]

permissions:
  contents: write

concurrency:
  group: release-flutter-travel-${{ github.event.client_payload.repo }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.increment_version.outputs.new_version }}
      owner: ${{ steps.repo.outputs.owner }}
      name: ${{ steps.repo.outputs.name }}
      package_name: ${{ steps.app_meta.outputs.package_name }}
      app_name: ${{ steps.app_meta.outputs.app_name }}
      commit_sha: ${{ steps.push.outputs.commit_sha }}
    steps:
      - name: Extract owner/repo
        id: repo
        shell: bash
        run: |
          FULL="${{ github.event.client_payload.repo }}"
          echo "owner=${FULL%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${FULL#*/}"   >> "$GITHUB_OUTPUT"

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ steps.repo.outputs.owner }}
          repositories: ${{ steps.repo.outputs.name }}

      - name: Checkout target repo @ branch
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: refs/heads/${{ github.event.client_payload.branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Increment version
        id: increment_version
        run: bash increment_version.sh

      - name: Extract app metadata
        id: app_meta
        shell: bash
        run: |
          PACKAGE_NAME=$(grep -oP 'applicationId\s+["'"'"']\K[^"'"'"']+' android/app/build.gradle)
          APP_NAME=$(grep -oP '^name:\s*\K\S+' pubspec.yaml)
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and push
        id: push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "[skip ci] Increment version to ${{ steps.increment_version.outputs.new_version }}" || echo "No changes"
          git push origin HEAD:${{ github.event.client_payload.branch }}
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo @ version-bumped commit
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ needs.prepare.outputs.commit_sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch build secrets from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Fetch .env from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: file
          file-output-path: /.env

      - name: Decode keystore
        run: echo "${{ env.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Decode google-services.json
        run: echo "${{ env.SERVICE_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: microsoft
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-overwrite-existing: true
          cache-read-only: false

      - name: Read .flutter-version
        id: flutter-version
        shell: bash
        run: |
          if [ -f .flutter-version ]; then
            echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: stable
          cache: true

      - name: Cache Android project Gradle
        uses: actions/cache@v5
        with:
          path: android/.gradle/
          key: android-project-gradle-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            android-project-gradle-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release --no-pub --android-project-cache-dir=.gradle
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"
          STORE_FILE: ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  build-ios:
    needs: prepare
    runs-on: macos-26
    env:
      COCOAPODS_DISABLE_STATS: "true"
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Checkout target repo @ version-bumped commit
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.client_payload.repo }}
          ref: ${{ needs.prepare.outputs.commit_sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Capture Xcode version
        id: xcode-version
        shell: bash
        run: |
          version="$(xcodebuild -version | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/ $//')"
          key="$(printf '%s' "$version" | shasum -a 256 | cut -d' ' -f1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "cache-key=$key" >> "$GITHUB_OUTPUT"

      - name: Fetch build secrets from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Fetch .env from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /App-Env
          export-type: file
          file-output-path: /.env

      - name: Decode GoogleService-Info.plist
        run: echo "${{ env.SERVICE_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Install Apple certificate and provisioning profiles
        run: curl -sSL https://raw.githubusercontent.com/Lascade-Co/actions/main/scripts/install_apple_cert.sh | bash

      - name: Install additional provisioning profiles
        shell: bash
        run: |
          PROFILES_DIR_LEGACY="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILES_DIR_NEW="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR_LEGACY" "$PROFILES_DIR_NEW"

          install_extra_profile() {
            local b64_var="$1" env_var="$2" label="$3"
            local b64_value="${!b64_var:-}"
            if [ -n "$b64_value" ]; then
              TEMP_PROFILE=$(mktemp)
              echo "$b64_value" | base64 --decode > "$TEMP_PROFILE"
              DECODED=$(security cms -D -i "$TEMP_PROFILE")
              UUID=$(echo "$DECODED" | plutil -extract UUID raw -)
              NAME=$(echo "$DECODED" | plutil -extract Name raw -)
              cp "$TEMP_PROFILE" "$PROFILES_DIR_LEGACY/$UUID.mobileprovision"
              cp "$TEMP_PROFILE" "$PROFILES_DIR_NEW/$UUID.mobileprovision"
              rm -f "$TEMP_PROFILE"
              echo "${env_var}_UUID=$UUID" >> "$GITHUB_ENV"
              echo "${env_var}_NAME=$NAME" >> "$GITHUB_ENV"
              echo "Installed $label profile: $NAME ($UUID)"
            fi
          }

          install_extra_profile IOS_SHARE_EXT_PROVISION_PROFILE_BASE64             SHARE_EXT_PROFILE    "share extension"
          install_extra_profile IOS_LIVE_ACTIVITY_APPSTORE_PROVISION_PROFILE_BASE64 LIVE_ACTIVITY_PROFILE "live activity widget"

      - name: Switch Xcode project to manual signing
        run: curl -sSL https://raw.githubusercontent.com/Lascade-Co/actions/main/scripts/fix_ios_signing.py | python3 -

      - name: Generate ExportOptions.plist
        shell: bash
        run: |
          /usr/libexec/PlistBuddy -c "Clear dict" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string ${{ env.IOS_TEAM_ID }}" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${{ env.IOS_BUNDLE_ID }} string ${{ env.APP_PROFILE_UUID }}" ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${{ env.IOS_BUNDLE_ID }}.OneSignalNotificationServiceExtension string ${{ env.NSE_PROFILE_UUID }}" ExportOptions.plist
          if [ -n "${{ env.SHARE_EXT_PROFILE_UUID }}" ]; then
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${{ env.IOS_BUNDLE_ID }}.MapLinkShareExtension string ${{ env.SHARE_EXT_PROFILE_UUID }}" ExportOptions.plist
          fi
          if [ -n "${{ env.LIVE_ACTIVITY_PROFILE_UUID }}" ]; then
            /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${{ env.IOS_BUNDLE_ID }}.LiveActivityWidget string ${{ env.LIVE_ACTIVITY_PROFILE_UUID }}" ExportOptions.plist
          fi

      - name: Read .flutter-version
        id: flutter-version
        shell: bash
        run: |
          if [ -f .flutter-version ]; then
            echo "version=$(cat .flutter-version)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: stable
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: pods-${{ runner.os }}-${{ steps.xcode-version.outputs.cache-key }}-${{ hashFiles('ios/Podfile', 'ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-${{ steps.xcode-version.outputs.cache-key }}-
            pods-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release IPA
        run: flutter build ipa --export-options-plist=ExportOptions.plist --no-pub

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

  publish:
    needs: [prepare, build-android, build-ios]
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ needs.prepare.outputs.owner }}
          repositories: ${{ needs.prepare.outputs.name }}

      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: android-release
          path: artifacts/android

      - name: Download iOS artifact
        uses: actions/download-artifact@v8
        with:
          name: ios-release
          path: artifacts/ios

      - name: Locate artifacts
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          AAB=$(find artifacts/android -name "*.aab" | head -n 1)
          IPA=$(find artifacts/ios -name "*.ipa" | head -n 1)
          : "${AAB:?Missing AAB}"
          : "${IPA:?Missing IPA}"
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

      - name: Ensure release notes file
        run: |
          if [ ! -f artifacts/android/releasenotes.txt ]; then
            printf "Bug fixes and improvements\n" > releasenotes.txt
          else
            cp artifacts/android/releasenotes.txt releasenotes.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.event.client_payload.repo }}
          token: ${{ steps.app-token.outputs.token }}
          tag_name: v${{ needs.prepare.outputs.version }}
          target_commitish: ${{ needs.prepare.outputs.commit_sha }}
          name: v${{ needs.prepare.outputs.version }}
          body_path: releasenotes.txt
          files: |
            ${{ steps.assets.outputs.aab }}
            ${{ steps.assets.outputs.ipa }}

      - name: Fetch TestFlight secrets from Infisical (prod)
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ github.event.client_payload.project_slug }}
          env-slug: "prod"
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          secret-path: /Build
          export-type: env

      - name: Upload to TestFlight
        run: |
          mkdir -p ~/private_keys
          echo "${{ env.APPSTORE_API_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ env.APPSTORE_API_KEY_ID }}.p8
          xcrun altool --upload-app \
            -f "${{ steps.assets.outputs.ipa }}" \
            --type ios \
            --apiKey "${{ env.APPSTORE_API_KEY_ID }}" \
            --apiIssuer "${{ env.APPSTORE_ISSUER_ID }}"

